# OpenCrane keeps MCPServer as a first-class CRD even when Obot brokers runtime traffic.
# The CRD is the control-plane source of truth for inventory, grants, credential refs,
# and reconciliation status; the gateway plane consumes this record instead of replacing it.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mcpservers.opencrane.io
spec:
  group: opencrane.io
  names:
    kind: MCPServer
    listKind: MCPServerList
    plural: mcpservers
    singular: mcpserver
    shortNames:
      - mcp
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - endpoint
              properties:
                description:
                  type: string
                  description: Human-readable summary of the MCP server.
                endpoint:
                  type: string
                  minLength: 1
                  description: Cluster-local or operator-managed upstream endpoint for this MCP server.
                transport:
                  type: string
                  enum:
                    - sse
                    - stdio
                    - streamable-http
                  default: sse
                  description: Transport mode the gateway should use when brokering calls.
                scopes:
                  type: array
                  description: Optional scopes required when the gateway invokes this server.
                  items:
                    type: string
                gateway:
                  type: object
                  description: Gateway-specific policy knobs reconciled into the in-cluster MCP plane.
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    audience:
                      type: string
                      default: obot-gateway
                    timeoutSeconds:
                      type: integer
                      minimum: 1
                      default: 30
                credentialsSecretRef:
                  type: string
                  description: Secret reference understood by the control-plane/operator authority path.
            status:
              type: object
              properties:
                phase:
                  type: string
                lastReconciled:
                  type: string
                  format: date-time
                message:
                  type: string
      additionalPrinterColumns:
        - name: Transport
          type: string
          jsonPath: .spec.transport
        - name: Endpoint
          type: string
          jsonPath: .spec.endpoint
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
