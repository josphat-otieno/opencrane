{{- /* ClusterIP exposing the operator's in-process identity-routing gateway proxy
       (DOMAIN.T4). Rendered only when gatewayProxy.enabled — the operator otherwise has
       no Service (it only watches the API). The wildcard Ingress routes the gateway WS
       upgrade to this Service; it forwards to each user's pod by resolved identity. */ -}}
{{- if .Values.gatewayProxy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opencrane.fullname" . }}-gateway-proxy
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway-proxy
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.gatewayProxy.port }}
      targetPort: gateway-proxy
      protocol: TCP
      name: gateway-proxy
  selector:
    {{- include "opencrane.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: operator
{{- end }}
