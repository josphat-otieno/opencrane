<div class="flex flex-column gap-3">
  <div class="flex flex-column gap-1">
    <label for="org-datasets" class="font-medium">Org datasets</label>
    <input
      pInputText
      id="org-datasets"
      [value]="_orgInput()"
      (input)="_orgInput.set($any($event.target).value)"
      [disabled]="disabled || saving"
      placeholder="default, global"
    />
  </div>

  <div class="flex flex-column gap-1">
    <label for="team-datasets" class="font-medium">Team datasets</label>
    <input
      pInputText
      id="team-datasets"
      [value]="_teamInput()"
      (input)="_teamInput.set($any($event.target).value)"
      [disabled]="disabled || saving"
      placeholder="engineering"
    />
  </div>

  <div class="flex flex-column gap-1">
    <label for="project-datasets" class="font-medium">Project datasets</label>
    <input
      pInputText
      id="project-datasets"
      [value]="_projectInput()"
      (input)="_projectInput.set($any($event.target).value)"
      [disabled]="disabled || saving"
      placeholder="apollo"
    />
  </div>

  <div class="flex flex-column gap-1">
    <label for="personal-datasets" class="font-medium">Personal datasets</label>
    <input
      pInputText
      id="personal-datasets"
      [value]="_personalInput()"
      (input)="_personalInput.set($any($event.target).value)"
      [disabled]="disabled || saving"
      placeholder="owner@example.com"
    />
  </div>

  @if (error) {
    <p-message severity="error" [text]="error" />
  }

  @if (success) {
    <p-message severity="success" text="Dataset memberships saved." />
  }

  <div class="flex justify-content-end">
    <p-button
      label="Save datasets"
      icon="pi pi-save"
      [loading]="saving"
      [disabled]="disabled || saving"
      (click)="_save()"
    />
  </div>
</div>
