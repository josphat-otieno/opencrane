<main class="wo-workspace__main">
	<wo-conversation-view
		[threadId]="threadId()"
		[contextOpen]="contextOpen()"
		[initialMessage]="initialMessage"
		(toggleContext)="contextOpen.set(!contextOpen())"
		(startSession)="startSession($event)"
	/>
	@if (filePreview.file(); as file) {
		<!-- A file a tool read/wrote, portaled to the side; takes the right column while open. -->
		<wo-file-panel [file]="file" (closed)="filePreview.close()" />
	} @else if (contextOpen()) {
		<wo-context-panel (closed)="contextOpen.set(false)" />
	}
</main>
