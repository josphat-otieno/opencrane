{{- if and .Values.ingress.enabled .Values.ingress.tls.enabled .Values.certManager.enabled }}
{{- /*
Per-silo TLS certificate for the clustertenant-manager host.

The silo serves its control plane at the ORG host (`ingress.controlPlaneHost` =
`<cluster-tenant>.<base>`, set by the silo deploy profile). A Kubernetes Ingress can only
reference a TLS secret in its OWN namespace — so each silo must issue its own cert here, into
the secret the clustertenant-manager Ingress references. The Issuer it references
(`certManager.issuerName`) is either created by THIS chart (cluster-issuer.yaml, #151 item 2 —
the standalone default, `certManager.selfManagedIssuer=true`) or by an external fleet chart in
a fleet-managed topology (`certManager.selfManagedIssuer=false`) — either way the kind
(ClusterIssuer vs. namespaced Issuer) follows the SAME `opencrane.namespacedCertIssuer` helper
the operator's CERT_MANAGER_ISSUER_KIND env var derives from, so they can never disagree.
*/ -}}
{{- $host := .Values.ingress.controlPlaneHost | default (printf "platform.%s" .Values.ingress.domain) -}}
{{- $issuerKind := ternary "Issuer" "ClusterIssuer" (eq (include "opencrane.namespacedCertIssuer" .) "true") -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "opencrane.fullname" . }}-clustertenant-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: clustertenant-manager
spec:
  secretName: {{ required "ingress.tls.secretName is required when ingress.tls.enabled" .Values.ingress.tls.secretName }}
  issuerRef:
    name: {{ required "certManager.issuerName is required when certManager.enabled" .Values.certManager.issuerName }}
    kind: {{ $issuerKind }}
  dnsNames:
    - {{ $host | quote }}
{{- end }}
