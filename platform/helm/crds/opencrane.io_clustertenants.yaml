apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clustertenants.opencrane.io
spec:
  group: opencrane.io
  names:
    kind: ClusterTenant
    listKind: ClusterTenantList
    plural: clustertenants
    singular: clustertenant
    shortNames:
      - ct
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [displayName, isolationTier]
              properties:
                displayName:
                  type: string
                  minLength: 1
                  description: Human-readable customer name.
                isolationTier:
                  type: string
                  enum: [shared, dedicatedNodes, dedicatedCluster]
                  default: shared
                  description: >-
                    Isolation strength for this customer. shared = namespace on bin-packed
                    nodes; dedicatedNodes = namespace + tainted node pool; dedicatedCluster =
                    own kube-apiserver (external provisioner only).
                compute:
                  type: object
                  properties:
                    mode:
                      type: string
                      enum: [shared, dedicated]
                      default: shared
                      description: Whether pods bin-pack on shared nodes or pin to a dedicated pool.
                    nodePool:
                      type: string
                      description: Dedicated node pool name; required when mode is dedicated.
                resources:
                  type: object
                  properties:
                    quota:
                      type: object
                      description: Aggregate resource ceiling enforced over the customer's namespace.
                      properties:
                        cpu:
                          type: string
                          description: Total CPU the customer may request (e.g. "4", "500m").
                        memory:
                          type: string
                          description: Total memory the customer may request (e.g. "8Gi").
                        pods:
                          type: integer
                          minimum: 0
                          description: Maximum number of pods the customer may run.
                        storage:
                          type: string
                          description: Total persistent storage the customer may claim (e.g. "100Gi").
                        gpu:
                          type: integer
                          minimum: 0
                          description: Total GPUs the customer may request.
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [pending, provisioning, ready, failed]
                message:
                  type: string
                boundNamespace:
                  type: string
                provisioner:
                  type: string
                lastReconciled:
                  type: string
                  format: date-time
      additionalPrinterColumns:
        - name: Display Name
          type: string
          jsonPath: .spec.displayName
        - name: Tier
          type: string
          jsonPath: .spec.isolationTier
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Namespace
          type: string
          jsonPath: .status.boundNamespace
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
