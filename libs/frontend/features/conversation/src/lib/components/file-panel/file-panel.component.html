<div class="wo-file">
	<div class="wo-file__head">
		<i class="pi pi-file wo-file__icon"></i>
		<span class="wo-file__path wo-mono wo-truncate" [title]="file().path">{{ file().path }}</span>
		<button type="button" class="wo-file__close" (click)="closed.emit()" title="Close file">
			<i class="pi pi-times"></i>
		</button>
	</div>
	<div class="wo-file__body wo-scrollable">
		<div class="wo-file__code" woCopyCode [innerHTML]="contentMarkdown() | woMarkdown"></div>
	</div>
</div>
