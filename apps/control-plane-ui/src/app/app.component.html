<div class="layout">
  <header class="header">
    <div class="header-top">
      <div>
        <p class="kicker">OpenCrane</p>
        <h1>Control Plane Dashboard</h1>
      </div>

      @if (authStatus()?.authenticated) {
        <div class="auth-state">
          <span class="auth-user">{{ displayName() }}</span>
          <button pButton type="button" label="Sign Out" icon="pi pi-sign-out" severity="secondary" (click)="logout()"></button>
        </div>
      }
    </div>

    <p-menubar [model]="navigation"></p-menubar>
  </header>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
