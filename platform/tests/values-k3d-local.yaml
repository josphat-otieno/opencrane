operator:
  image:
    repository: opencrane/operator
    tag: local
    pullPolicy: IfNotPresent
  watchNamespace: opencrane-system

controlPlane:
  image:
    repository: opencrane/control-plane
    tag: local
    pullPolicy: IfNotPresent
  replicas: 1

tenant:
  defaultImage:
    repository: opencrane/tenant
    tag: local
    pullPolicy: IfNotPresent

sharedSkills:
  enabled: true
  pvc:
    storageClass: local-path
    accessMode: ReadWriteOnce
    size: 1Gi

ingress:
  enabled: true
  className: nginx
  # sslip.io resolves <anything>.127.0.0.1.sslip.io → 127.0.0.1 with no /etc/hosts
  # and supports dynamic tenants, so <tenant>.127.0.0.1.sslip.io reaches the local
  # k3d ingress. The single wildcard *.127.0.0.1.sslip.io cert covers every tenant.
  domain: 127.0.0.1.sslip.io
  tls:
    enabled: true
    secretName: opencrane-wildcard-tls

# Dev TLS: cert-manager issues a real (self-signed, not browser-trusted) wildcard
# cert instantly with no DNS-01 challenge. wss:// + the CONN.2 wss-only/Secure/HSTS
# hardening are NOT bypassed — only the trust anchor differs from production ACME.
# Trust the cert locally (or run mkcert) to silence the browser warning.
certManager:
  enabled: true
  mode: selfSigned
  issuerName: opencrane-issuer

externalSecrets:
  enabled: false

litellm:
  enabled: true
  generateMasterKey: false
  image:
    repository: ghcr.io/berriai/litellm-non_root
    tag: main-v1.81.0-stable
    pullPolicy: IfNotPresent