# opencrane-dev GKE overlay — layer on top of gcp.yaml.
#
# Cluster: gke_weownai-proto_europe-west1-b_opencrane-dev  (project weownai-proto)
# Base domain: dev.opencrane.ai
#
# Usage (via the multi-tenant profile). The deploy script uses --reset-then-reuse-values:
# it merges chart defaults (new keys like multiCt) with the prior release values, so the
# overlay only needs to override non-default keys. Since reset re-applies chart defaults
# for all keys the invocation doesn't supply, per-component image tags (--control-plane-tag,
# --operator-tag, etc.) must be restated explicitly with --tag flags (they are not carried
# from --values files).
#
#   apps/fleet-platform/deploy.sh \
#     --base-domain dev.opencrane.ai \
#     --ingress-ip 34.22.213.142 \
#     --operator-tag <new-operator-image-tag> \
#     --values libs/k8s-platform/values/opencrane-dev.yaml

global:
  environment: dev

ingress:
  domain: dev.opencrane.ai
  # -- Cluster ingress-nginx LoadBalancer external IP. The org-domain provisioner
  #    points each `<org>.dev.opencrane.ai` A record here (as a DNSEndpoint CR).
  #    EMPTY on the live release => operator INGRESS_IP="" => ZERO DNSEndpoint CRs
  #    were ever created => NXDOMAIN. Also settable via deploy `--ingress-ip`.
  #    Source: `kubectl -n ingress-nginx get svc ingress-nginx-controller` EXTERNAL-IP.
  externalIp: "34.22.213.142"

# -- Identity-routing gateway proxy, folded in-process into the operator (DOMAIN.T4).
#    OFF by default — but with it off there is NO wildcard/org Ingress and NO proxy
#    Service, so even a resolvable `<org>.<base>` has nothing routing it to a pod.
#    Enabling it makes the operator internet-facing via the wildcard Ingress
#    (a deliberate interim trade-off, documented in values.yaml).
gatewayProxy:
  enabled: true

tenant:
  gateway:
    # -- OC-2 / CONN.4 trusted-proxy allowlist for the opencrane-dev cluster.
    #
    #    With the in-operator proxy enabled, the tenant pod gateway's immediate TCP
    #    peer is the OPERATOR pod (browser -> wildcard Ingress -> operator proxy ->
    #    tenant pod). So the gateway must trust the operator's pod source IP, which
    #    falls in the cluster pod CIDR.
    #
    #    Authoritative (read-only, 2026-06-23):
    #      - GKE cluster pod IPv4 CIDR: 10.8.0.0/14
    #        `gcloud container clusters describe opencrane-dev --zone europe-west1-b \
    #           --format='value(clusterIpv4Cidr)'`
    #      - The per-tenant gateway NetworkPolicy ALREADY restricts port 18789 to
    #        ingress from namespace=opencrane-system, pod component=operator — so this
    #        CIDR is only the coarse IP gate; the NetworkPolicy is the precise guard
    #        and no other in-cluster pod can reach the gateway port.
    #
    #    EMPTY on the live release => trustedProxies:[] => the gateway fail-closes and
    #    rejects ALL connections (OpenClaw treats an empty list as "trust no source").
    trustedProxies:
      - 10.8.0.0/14
