<wo-section-heading
	title="Network & Egress"
	subtitle="Outbound domain allowlist enforced via Kubernetes NetworkPolicy. Your pod cannot reach domains not on this list."
/>

<wo-settings-row label="Egress policy" hint="Enforced at the network layer — not bypassable from within the pod.">
	<div class="wo-network__policy">
		<span class="wo-network__dot"></span>
		<span class="wo-mono">strict allowlist</span>
	</div>
</wo-settings-row>

<p class="wo-network__label">Allowed domains</p>
<table class="wo-table">
	<thead>
		<tr>
			<th>Domain</th>
			<th>Purpose</th>
			<th>Status</th>
			<th></th>
		</tr>
	</thead>
	<tbody>
		@for (domain of domains(); track domain.domain) {
			<tr>
				<td class="wo-mono">{{ domain.domain }}</td>
				<td class="wo-network__muted">{{ domain.purpose }}</td>
				<td><span class="wo-mono wo-network__active">{{ domain.status }}</span></td>
				<td class="wo-network__actions">
					<button type="button"><i class="pi pi-trash"></i></button>
				</td>
			</tr>
		}
	</tbody>
</table>

<button type="button" class="wo-dashed-button wo-network__request">
	<i class="pi pi-plus"></i>
	Request domain allowlist
</button>

<div class="wo-callout">
	Domain requests are reviewed by the org admin. Changes take up to 5 minutes to propagate via CiliumNetworkPolicy
	reconciliation.
</div>
