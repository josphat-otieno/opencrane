name: Release

# Publishes the OpenCrane Control Plane OpenAPI contract as a release asset.
# External consumers (e.g. private frontends) pin a tagged `openapi.json` and
# generate their own typed client from it — see libs/contracts/README.md.

on:
  push:
    tags:
      - "v*"

jobs:
  openapi-asset:
    name: Publish openapi.json release asset
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build emits the OpenAPI spec under dist so the release asset always
      # matches the tagged source.
      - name: Emit OpenAPI spec
        run: npm run build

      - name: Attach openapi.json to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/apps/opencrane/openapi.json
          fail_on_unmatched_files: true
