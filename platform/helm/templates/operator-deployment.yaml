apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencrane.fullname" . }}-operator
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      {{- include "opencrane.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        {{- include "opencrane.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: {{ include "opencrane.fullname" . }}-operator
      containers:
        - name: operator
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          env:
            # -- This pod's own namespace (downward API). Used only as the safe
            #    fallback host for runtime-plane URLs when their env is unset, so a
            #    fallback never points at another instance's namespace (B5).
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- include "opencrane.observabilityEnv" (dict "ctx" $ "component" "operator") | nindent 12 }}
            - name: WATCH_NAMESPACE
              value: {{ .Values.operator.watchNamespace | quote }}
            # -- Multi-instance fail-closed guard (brief B2): when true the operator
            #    refuses to start with an empty WATCH_NAMESPACE, so it can never
            #    reconcile another instance's Tenants cluster-wide.
            - name: REQUIRE_WATCH_NAMESPACE
              value: {{ .Values.multiInstance.requireWatchNamespace | quote }}
            - name: TENANT_DEFAULT_IMAGE
              value: "{{ .Values.tenant.defaultImage.repository }}:{{ .Values.tenant.defaultImage.tag }}"
            - name: DEFAULT_OPENCLAW_VERSION
              value: {{ .Values.tenant.defaultOpenclawVersion | quote }}
            - name: INGRESS_DOMAIN
              value: {{ .Values.ingress.domain | quote }}
            # -- Per-org domain provisioning (fixed-wildcard topology). The operator's
            #    ClusterTenant reconciler applies a per-org `*.<org>.<domain>` Certificate
            #    (cert-manager) and, when externalIp is set, declares a per-org DNSEndpoint
            #    CR (reconciled by external-dns) for the `*.<org>.<domain>` A records. Both
            #    optional: an unset externalIp / absent CRD makes the operator skip the
            #    affected side effect at runtime rather than fail.
            - name: INGRESS_IP
              value: {{ .Values.ingress.externalIp | quote }}
            - name: CERT_MANAGER_ISSUER_NAME
              value: {{ .Values.certManager.issuerName | quote }}
            # -- Namespaced Issuer in multi-instance cert mode (MI.4), else the shared
            #    cluster-singleton ClusterIssuer.
            - name: CERT_MANAGER_ISSUER_KIND
              value: {{ if eq (include "opencrane.namespacedCertIssuer" .) "true" }}"Issuer"{{ else }}"ClusterIssuer"{{ end }}
            - name: INGRESS_TLS_ENABLED
              value: {{ .Values.ingress.tls.enabled | quote }}
            - name: INGRESS_TLS_SECRET_NAME
              value: {{ .Values.ingress.tls.secretName | quote }}
            - name: GATEWAY_PORT
              value: {{ .Values.tenant.gatewayPort | quote }}
            - name: HOSTING_PROVIDER
              value: {{ .Values.hosting.provider | quote }}
            {{- if eq .Values.hosting.provider "gcp" }}
            - name: GCP_PROJECT_ID
              value: {{ .Values.hosting.gcp.projectId | quote }}
            - name: GCP_BUCKET_PREFIX
              value: {{ .Values.hosting.gcp.bucketPrefix | quote }}
            - name: GCP_CSI_DRIVER
              value: {{ .Values.hosting.gcp.csiDriver | quote }}
            {{- end }}
            - name: IDLE_TIMEOUT_MINUTES
              value: {{ .Values.operator.idleTimeoutMinutes | quote }}
            - name: IDLE_CHECK_INTERVAL_SECONDS
              value: {{ .Values.operator.idleCheckIntervalSeconds | quote }}
            # -- Runtime-plane endpoints injected into tenant Deployments. Resolved via
            #    sharedPlatform scope (B5): instance mode → release-prefixed in-cluster
            #    Service; shared mode → the externally-provided endpoint.
            - name: MCP_GATEWAY_URL
              value: {{ include "opencrane.mcpGatewayUrl" . | quote }}
            - name: SKILL_REGISTRY_URL
              value: {{ include "opencrane.skillRegistryUrl" . | quote }}
            - name: PROJECTED_TOKEN_TTL_SECONDS
              value: {{ .Values.projectedIdentity.ttlSeconds | quote }}
            # -- In-cluster URL the operator injects into tenant Deployments so the
            #    contract re-pull loop (P4A.3) can reach the internal contract endpoint.
            - name: CONTROL_PLANE_INTERNAL_URL
              value: {{ printf "http://%s-control-plane:%v" (include "opencrane.fullname" .) .Values.controlPlane.service.port | quote }}
            # -- Kubernetes Deployment names for the runtime-plane drift repairer (P4A.2).
            - name: OBOT_DEPLOYMENT_NAME
              value: {{ printf "%s-mcp-gateway" (include "opencrane.fullname" .) | quote }}
            - name: SKILL_REGISTRY_DEPLOYMENT_NAME
              value: {{ printf "%s-skill-registry" (include "opencrane.fullname" .) | quote }}
            - name: LITELLM_ENABLED
              value: {{ .Values.litellm.enabled | quote }}
            # -- LiteLLM base endpoint, resolved via sharedPlatform scope (B5):
            #    instance mode → release-prefixed in-cluster Service; shared mode →
            #    sharedPlatform.litellm.shared.endpoint.
            - name: LITELLM_ENDPOINT
              value: {{ include "opencrane.litellmEndpoint" . | quote }}
            - name: LITELLM_DEFAULT_MONTHLY_BUDGET_USD
              value: {{ .Values.litellm.defaultMonthlyBudgetUsd | quote }}
            {{- if .Values.litellm.enabled }}
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.litellm.existingSecret }}
                  name: {{ .Values.litellm.existingSecret }}
                  {{- else }}
                  name: {{ include "opencrane.fullname" . }}-litellm
                  {{- end }}
                  key: {{ .Values.litellm.secretKey }}
            {{- end }}
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
