{{- /*
#151 item 2 — silo-owned cert-manager Issuer/ClusterIssuer.

certManagerIssuerName references an Issuer that a fleet chart used to be assumed to have
already created (see clustertenant-manager-certificate.yaml's original comment). A STANDALONE
silo has no fleet to do that, so this chart provisions its own — the cert-manager analogue of
`crds.install` (self-sufficiency, #151 item 3). Gated by `certManager.selfManagedIssuer`
(default true = self-contained); set false in a fleet-managed topology where an external
fleet chart already creates the Issuer, so this release's install/upgrade does not contend
with the fleet's release for ownership of the same object.

Every Certificate that will reference this Issuer in THIS chart is a SINGLE, non-wildcard
hostname (see docs/agents/cluster-architecture.md → "Tenancy Model"): the control-plane's own
host (clustertenant-manager-certificate.yaml) and the operator's optional per-org vanity
Certificate (libs/domain/cluster-tenants/main/src/core/org-domain.provisioner.ts). Neither
needs a wildcard SAN, so — unlike the old fleet-wide platform-wildcard Issuer this was ported
from — HTTP-01 through the ingress is sufficient on its own and is the default solver; DNS-01
is layered in ADDITIONALLY (scoped to `ingress.domain`) only when `certManager.acme.dns01.provider`
is set, for installs that prefer it or need to solve challenges before the ingress is reachable.

- mode=selfSigned : dev/local — issues instantly, no ACME challenge, not browser-trusted.
- mode=acme       : production — public CA (Let's Encrypt by default).

Issuer scope mirrors `opencrane.namespacedCertIssuer` (brief B4, MI.4) — the SAME helper
clustertenant-manager-deployment.yaml already uses to derive CERT_MANAGER_ISSUER_KIND, so
this template and that env var can never disagree on ClusterIssuer vs. namespaced Issuer:
- default (`multiInstance.certIssuer=cluster` or multiInstance disabled): one cluster-singleton
  ClusterIssuer.
- `multiInstance.enabled=true` + `multiInstance.certIssuer=namespaced`: a namespaced Issuer is
  rendered in EACH owned instance namespace, so per-instance installs never collide on one
  cluster-singleton issuer.

Requires cert-manager (cert-manager.io/v1) installed in-cluster.
*/ -}}
{{- if and .Values.certManager.enabled .Values.certManager.selfManagedIssuer }}
{{- $cm := .Values.certManager }}
{{- $namespaced := eq (include "opencrane.namespacedCertIssuer" .) "true" }}
{{- if and (eq $cm.mode "acme") (empty $cm.acme.email) }}
{{- fail "certManager.mode=acme requires certManager.acme.email to be set." }}
{{- end }}
{{- if not (or (eq $cm.mode "selfSigned") (eq $cm.mode "acme")) }}
{{- fail (printf "certManager.mode must be 'selfSigned' or 'acme', got %q" $cm.mode) }}
{{- end }}
{{- if $namespaced }}
{{- $namespaces := include "opencrane.instanceNamespaces" . | fromJsonArray }}
{{- range $ns := $namespaces }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ $cm.issuerName | quote }}
  namespace: {{ $ns | quote }}
  labels:
    {{- include "opencrane.labels" $ | nindent 4 }}
spec:
  {{- include "opencrane.certIssuerSpec" (dict "cm" $cm "ingress" $.Values.ingress) | nindent 2 }}
{{- end }}
{{- else }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ $cm.issuerName | quote }}
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
spec:
  {{- include "opencrane.certIssuerSpec" (dict "cm" $cm "ingress" .Values.ingress) | nindent 2 }}
{{- end }}
{{- end }}
