<div class="wo-settings">
	<nav class="wo-settings__nav">
		<p class="wo-settings__nav-title">Settings</p>
		@for (item of nav; track item.id) {
			<button
				type="button"
				class="wo-settings__nav-item"
				[class.wo-settings__nav-item--active]="active() === item.id"
				(click)="active.set(item.id)"
			>
				<i [class]="item.icon"></i>
				<span>{{ item.label }}</span>
				@if (item.badge) {
					<span class="wo-settings__badge wo-mono">{{ item.badge }}</span>
				}
			</button>
		}
	</nav>

	<div class="wo-settings__content wo-scrollable">
		<div class="wo-settings__inner">
			@switch (active()) {
				@case (sections.Pod) {
					<wo-pod-section />
				}
				@case (sections.Model) {
					<wo-model-budget-section />
				}
				@case (sections.Awareness) {
					<wo-awareness-section />
				}
				@case (sections.Skills) {
					<wo-skills-section />
				}
				@case (sections.Channels) {
					<wo-channels-section />
				}
				@case (sections.Access) {
					<wo-access-section />
				}
				@case (sections.Network) {
					<wo-network-section />
				}
				@case (sections.Account) {
					<wo-account-section />
				}
			}
		</div>
	</div>
</div>
