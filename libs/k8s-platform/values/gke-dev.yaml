# Dev GKE overlay — layer on top of gcp.yaml.
#
# Usage:
#   helm upgrade --install opencrane apps/fleet-platform -n opencrane-system \
#     -f libs/k8s-platform/values/gcp.yaml \
#     -f libs/k8s-platform/values/gke-dev.yaml

global:
  environment: dev

ingress:
  domain: dev.weownai.eu

clustertenantManager:
  image:
    tag: latest

fleetManager:
  image:
    tag: latest
  # Required when multiInstance.requireWatchNamespace is true — tells the
  # operator which namespace to watch for Tenant CRs.
  watchNamespace: opencrane-system

tenant:
  image:
    tag: latest
  gateway:
    # OC-2 / CONN.4 trusted-proxy allowlist for the weownai-dev GKE cluster.
    #
    # Discovered read-only (2026-06-22):
    #   - GKE cluster pod IPv4 CIDR (authoritative): 10.55.128.0/17
    #     `gcloud container clusters describe weownai-dev --region europe-west1`
    #   - ingress-nginx controller pod: 10.55.128.156 (inside that range)
    #     `kubectl get pods -n ingress-nginx -o wide`
    #
    # Set to the whole cluster pod CIDR so the value still matches wherever the
    # ingress controller pod is (re)scheduled — the per-tenant gateway NetworkPolicy
    # independently restricts ingress to the gateway port to the ingress-nginx
    # namespace, so this CIDR cannot be abused by other in-cluster pods.
    trustedProxies:
      - 10.55.128.0/17

multiInstance:
  # Re-enable the isolation guard (requireWatchNamespace: true is correct for
  # multi-instance clusters). The operator refuses to start if WATCH_NAMESPACE
  # is empty, so operator.watchNamespace above must always be set alongside this.
  requireWatchNamespace: true

mcpGateway:
  image:
    # Pinned to the audited stable tag. Bump deliberately.
    tag: v0.23.1

litellm:
  # Disabled in dev: the container has an npm cache permission bug that causes
  # CrashLoopBackOff. The operator degrades gracefully (unrestricted model
  # access, no budget enforcement). Re-enable once the LiteLLM image is fixed.
  enabled: false

langfuse:
  inCluster:
    # Deploy Langfuse in-cluster on the dev GKE cluster.
    enabled: true
    adminEmail: "jente@elewa.ke"
  # Langfuse app overrides (forwarded to the langfuse subchart's langfuse: key).
  langfuse:
    additionalEnv:
      # Init-seed overrides for the dev cluster (supplements the base additionalEnv).
      - name: LANGFUSE_INIT_USER_EMAIL
        value: "jente@elewa.ke"
      - name: LANGFUSE_INIT_USER_NAME
        value: "Jente Rosseel"
      - name: LANGFUSE_INIT_ORG_ID
        value: "opencrane"
      - name: LANGFUSE_INIT_ORG_NAME
        value: "OpenCrane"
      - name: LANGFUSE_INIT_PROJECT_ID
        value: "opencrane-llm"
      - name: LANGFUSE_INIT_PROJECT_NAME
        value: "OpenCrane LLM"
      - name: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
        valueFrom:
          secretKeyRef:
            name: opencrane-langfuse
            key: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
      - name: LANGFUSE_INIT_PROJECT_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: opencrane-langfuse
            key: LANGFUSE_INIT_PROJECT_SECRET_KEY
      - name: LANGFUSE_INIT_USER_PASSWORD
        valueFrom:
          secretKeyRef:
            name: opencrane-langfuse
            key: LANGFUSE_INIT_USER_PASSWORD
    # Langfuse ingress (served at langfuse.dev.weownai.eu via ingress-nginx + cert-manager).
    ingress:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: opencrane-letsencrypt
      hosts:
        - host: langfuse.dev.weownai.eu
          paths:
            - path: /
              pathType: Prefix
      tls:
        enabled: true
        secretName: langfuse-tls
