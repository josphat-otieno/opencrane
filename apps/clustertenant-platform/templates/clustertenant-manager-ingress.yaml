{{- if .Values.ingress.enabled -}}
{{- /*
Fixed-wildcard topology: the control plane is the FIXED super-operator host, distinct
from the org-wildcard base (`ingress.domain`). It serves at `ingress.controlPlaneHost`
when set, else the derived default `platform.<ingress.domain>` — never under the org
wildcard `*.<ingress.domain>`. See docs/agents/cluster-architecture.md → "Tenancy Model".
*/ -}}
{{- $host := .Values.ingress.controlPlaneHost | default (printf "platform.%s" .Values.ingress.domain) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "opencrane.fullname" . }}-clustertenant-manager
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: clustertenant-manager
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | default "opencrane-wildcard-tls" }}
  {{- end }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          {{- if .Values.ingress.sameOrigin.enabled }}
          # Same-origin: backend under /api (auth = /api/v1/auth/*), gateway WS under
          # /gateway, and the org-admin SPA owns /. Helm OWNS these rules so no out-of-band
          # kubectl patch is needed (see values ingress.sameOrigin + docs/optimalisation-plan.md §5).
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "opencrane.fullname" . }}-clustertenant-manager
                port:
                  number: {{ .Values.clustertenantManager.service.port }}
          {{- if .Values.gatewayProxy.enabled }}
          - path: /gateway
            pathType: Prefix
            backend:
              service:
                name: {{ include "opencrane.fullname" . }}-gateway-proxy
                port:
                  number: {{ .Values.gatewayProxy.port }}
          # OpenClaw's Control UI static bundle, so the org SPA can embed it as the chat
          # surface. The gateway-proxy reverse-proxies /control-ui to the caller's pod
          # gateway (which serves the bundle under this base path); the WS stays on /gateway.
          - path: /control-ui
            pathType: Prefix
            backend:
              service:
                name: {{ include "opencrane.fullname" . }}-gateway-proxy
                port:
                  number: {{ .Values.gatewayProxy.port }}
          {{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.ingress.sameOrigin.spaService }}
                port:
                  number: {{ .Values.ingress.sameOrigin.spaPort }}
          {{- else }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "opencrane.fullname" . }}-clustertenant-manager
                port:
                  number: {{ .Values.clustertenantManager.service.port }}
          {{- end }}
{{- end }}