apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "opencrane.fullname" . }}-clustertenant-manager
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
{{- if eq (include "opencrane.namespacedRbac" .) "true" }}
{{- /*
  Multi-instance mode (brief B1): grant the control-plane only over the namespace(s)
  this instance owns, via Role + RoleBinding. Instance A's control-plane SA therefore
  cannot read/write instance B's Tenants, AccessPolicies, or pods.
*/}}
{{- $namespaces := include "opencrane.instanceNamespaces" . | fromJsonArray }}
{{- range $ns := $namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "opencrane.fullname" $ }}-clustertenant-manager
  namespace: {{ $ns }}
  labels:
    {{- include "opencrane.labels" $ | nindent 4 }}
rules:
{{ include "opencrane.clustertenantManagerRbacRules" $ | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "opencrane.fullname" $ }}-clustertenant-manager
  namespace: {{ $ns }}
  labels:
    {{- include "opencrane.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "opencrane.fullname" $ }}-clustertenant-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "opencrane.fullname" $ }}-clustertenant-manager
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- else }}
{{- /*
  Legacy single-install mode: cluster-wide ClusterRole + ClusterRoleBinding over the
  (namespaced) control-plane rules.
*/}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  # Cluster-scoped → name MUST be unique per silo, or a second silo's release can't import a
  # ClusterRole the first already owns. Suffix with the release namespace (one silo per ns).
  name: {{ include "opencrane.fullname" . }}-clustertenant-manager-{{ .Release.Namespace }}
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
rules:
{{ include "opencrane.clustertenantManagerRbacRules" . | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "opencrane.fullname" . }}-clustertenant-manager-{{ .Release.Namespace }}
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "opencrane.fullname" . }}-clustertenant-manager-{{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ include "opencrane.fullname" . }}-clustertenant-manager
    namespace: {{ .Release.Namespace }}
{{- end }}
---
{{- /*
  Stage 4: the silo READS the cluster-scoped ClusterTenant CR to resolve a host's per-org
  login client (per-org-client.ts: get by name, list by vanityDomain). ClusterTenant is
  cluster-scoped, so a get/list/watch grant cannot live in the namespaced Role above — it
  needs this minimal ClusterRole, rendered in BOTH modes. READ-ONLY: the fleet-manager owns
  ClusterTenant writes + provisioning; the silo never mutates the CR. (Platform-DNS / Zitadel
  cluster-scoped grants moved to fleet-manager-platform-dns-rbac.yaml + the fleet operator RBAC.)
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  # Cluster-scoped → suffix per silo (see the clustertenant-manager ClusterRole above).
  name: {{ include "opencrane.fullname" . }}-clustertenant-manager-ct-read-{{ .Release.Namespace }}
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
rules:
  - apiGroups: ["opencrane.io"]
    resources: ["clustertenants"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "opencrane.fullname" . }}-clustertenant-manager-ct-read-{{ .Release.Namespace }}
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "opencrane.fullname" . }}-clustertenant-manager-ct-read-{{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ include "opencrane.fullname" . }}-clustertenant-manager
    namespace: {{ .Release.Namespace }}
