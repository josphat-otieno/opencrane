@if (model(); as info) {
	<span class="wo-model-chip wo-mono" [style.background]="providerColor() + '12'" [style.border-color]="providerColor() + '30'">
		<span class="wo-model-chip__provider" [style.color]="providerColor()">{{ info.provider[0] }}</span>
		<span class="wo-model-chip__label">{{ info.label }}</span>
		<span class="wo-model-chip__price">{{ pricing() }}</span>
		@if (removable()) {
			<button type="button" (click)="removed.emit()"><i class="pi pi-times"></i></button>
		}
	</span>
}
