{{- /* Render the release-local feat-skill-registry (workload + RBAC) only when enabled
       AND instance-scoped. When sharedPlatform.skillRegistry.mode=shared, the operator
       points tenants at the external registry (opencrane.skillRegistryUrl) and no
       in-release workload, ServiceAccount, or token-review RBAC is created. */ -}}
{{- if and .Values.skillRegistry.enabled (ne (include "opencrane.skillRegistryShared" .) "true") }}
---
# ServiceAccount for the feat-skill-registry pod. automountServiceAccountToken is
# enabled here (unlike tenant pods) so the pod can call the Kubernetes TokenReview
# API to validate incoming projected ServiceAccount tokens from tenant pods.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "opencrane.fullname" . }}-feat-skill-registry
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: feat-skill-registry
---
# ClusterRole granting the feat-skill-registry the ability to create TokenReview
# objects — required to validate tenant projected ServiceAccount tokens.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  # Cluster-scoped → suffix per silo so multiple silos don't collide on one shared name.
  name: {{ include "opencrane.fullname" . }}-feat-skill-registry-token-review-{{ .Release.Namespace }}
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "opencrane.fullname" . }}-feat-skill-registry-token-review-{{ .Release.Namespace }}
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "opencrane.fullname" . }}-feat-skill-registry
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "opencrane.fullname" . }}-feat-skill-registry-token-review-{{ .Release.Namespace }}
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencrane.fullname" . }}-feat-skill-registry
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: feat-skill-registry
spec:
  replicas: {{ .Values.skillRegistry.replicas }}
  selector:
    matchLabels:
      {{- include "opencrane.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: feat-skill-registry
  template:
    metadata:
      labels:
        {{- include "opencrane.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: feat-skill-registry
    spec:
      serviceAccountName: {{ include "opencrane.fullname" . }}-feat-skill-registry
      securityContext:
        {{- toYaml .Values.skillRegistry.podSecurityContext | nindent 8 }}
      containers:
        - name: feat-skill-registry
          image: "{{ .Values.skillRegistry.image.repository }}:{{ .Values.skillRegistry.image.tag }}"
          imagePullPolicy: {{ .Values.skillRegistry.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.skillRegistry.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.skillRegistry.service.port }}
          env:
            - name: PORT
              value: {{ .Values.skillRegistry.service.port | quote }}
            {{- include "opencrane.observabilityEnv" (dict "ctx" $ "component" "feat-skill-registry") | nindent 12 }}
            # In-cluster opencrane-ui URL for internal entitlement + content calls
            # (/api/internal/bundles) — targets the INTERNAL listener port, not the public one.
            - name: CONTROL_PLANE_URL
              value: "http://{{ include "opencrane.fullname" . }}-opencrane-server.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.clustertenantManager.service.internalPort }}"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.skillRegistry.resources | nindent 12 }}
{{- end }}
