<div class="wo-tools" [class.wo-tools--open]="open()">
	@if (single()) {
		<wo-tool-entry [card]="tools()[0]" />
	} @else {
		<button type="button" class="wo-tools__summary" [class.wo-tools__summary--error]="anyError()" (click)="toggle()">
			<i class="pi pi-angle-right wo-tools__caret"></i>
			<span class="wo-tools__label wo-mono">{{ summary() }}</span>
			@if (anyError()) {
				<i class="pi pi-exclamation-triangle wo-tools__warn"></i>
			}
		</button>

		@if (open()) {
			<div class="wo-tools__list">
				@for (tool of tools(); track $index) {
					<wo-tool-entry [card]="tool" />
				}
			</div>
		}
	}

	@if (time()) {
		<span class="wo-tools__time wo-mono">{{ time() }}</span>
	}
</div>
