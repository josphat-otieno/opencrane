<a
	[routerLink]="['/session', session().id]"
	routerLinkActive="wo-session--active"
	#rla="routerLinkActive"
	class="wo-session"
	[style.border-left-color]="rla.isActive ? session().color : 'transparent'"
>
	<span class="wo-session__dot" [style.background]="session().color" [style.opacity]="rla.isActive ? 1 : 0.6"></span>
	<span class="wo-session__body">
		<span class="wo-session__name wo-truncate" [class.wo-session__name--active]="rla.isActive">{{ session().name }}</span>
		<span class="wo-session__meta">
			@if (department(); as dept) {
				<span class="wo-mono" [style.color]="dept.color">{{ dept.label }}</span>
			}
			@if (session().subtitle) {
				<span class="wo-session__subtitle wo-truncate">· {{ session().subtitle }}</span>
			}
		</span>
	</span>
	@if (session().unread) {
		<span class="wo-session__unread wo-mono" [style.background]="session().color">{{ session().unread }}</span>
	}
</a>
