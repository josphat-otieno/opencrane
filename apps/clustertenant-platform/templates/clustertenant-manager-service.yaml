apiVersion: v1
kind: Service
metadata:
  name: {{ include "opencrane.fullname" . }}-clustertenant-manager
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: clustertenant-manager
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.clustertenantManager.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "opencrane.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: clustertenant-manager
