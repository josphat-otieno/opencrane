global:
  environment: prod

# Fleet chart image (fleet-manager = ClusterTenantOperator + fleet API).
fleetManager:
  image:
    repository: opencrane/operator
    tag: local
    pullPolicy: IfNotPresent

# Silo chart image (opencrane-server = in-silo controllers incl. the TenantOperator + API).
clustertenantManager:
  image:
    repository: opencrane/opencrane-server
    tag: local
    pullPolicy: IfNotPresent
  replicas: 1

tenant:
  defaultImage:
    repository: opencrane/tenant
    tag: local
    pullPolicy: IfNotPresent

sharedSkills:
  enabled: true
  pvc:
    storageClass: local-path
    accessMode: ReadWriteOnce
    size: 1Gi

ingress:
  enabled: true
  className: nginx
  domain: opencrane.local

externalSecrets:
  enabled: false

litellm:
  enabled: true
  generateMasterKey: false
  image:
    pullPolicy: IfNotPresent