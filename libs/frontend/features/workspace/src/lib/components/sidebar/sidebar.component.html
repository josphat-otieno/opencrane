<aside class="wo-rail">
	<div class="wo-rail__top">
		<div class="wo-rail__brand">
			<span class="wo-rail__logo wo-serif">OpenCrane</span>
			<wo-tenant-switcher />
		</div>
		<div class="wo-rail__actions">
			<button type="button" class="wo-rail__action" [class.wo-rail__action--active]="searchOpen()" (click)="searchOpen.set(!searchOpen())">
				<i class="pi pi-search"></i>
			</button>
			<button type="button" class="wo-rail__action wo-rail__action--bell" (click)="notificationsToggle.emit()">
				<i class="pi pi-bell"></i>
				@if (unreadCount() > 0) {
					<span class="wo-rail__bell-dot"></span>
				}
			</button>
			<a [routerLink]="['/tools']" routerLinkActive="wo-rail__action--active" class="wo-rail__action" title="Tools">
				<i class="pi pi-th-large"></i>
			</a>
			<a [routerLink]="['/settings']" routerLinkActive="wo-rail__action--active" class="wo-rail__action">
				<i class="pi pi-cog"></i>
			</a>
		</div>
	</div>

	@if (searchOpen()) {
		<div class="wo-rail__search">
			<input type="text" placeholder="Search sessions…" />
		</div>
	}

	<div class="wo-rail__lists wo-scrollable">
		<wo-collapsible-section title="My Sessions" variant="rail">
			@for (session of mySessions(); track session.id) {
				<wo-session-row [session]="session" />
			}
			<a [routerLink]="['/']" class="wo-rail__new-session">
				<i class="pi pi-plus"></i>
				New session
			</a>
		</wo-collapsible-section>

		<wo-collapsible-section title="Shared Sessions" variant="rail">
			@for (session of sharedSessions(); track session.id) {
				<wo-session-row [session]="session" />
			}
		</wo-collapsible-section>

		<wo-collapsible-section title="Automation Runs" variant="rail" [defaultOpen]="false">
			@for (run of automationRuns; track run.id) {
				<button type="button" class="wo-rail__run">
					<i class="pi pi-bolt" [style.color]="run.status === 'running' ? '#C84B31' : 'rgba(232,228,220,0.25)'"></i>
					<span class="wo-rail__run-name wo-truncate">{{ run.name }}</span>
					@if (department(run.dept); as dept) {
						<span class="wo-rail__run-dept wo-mono" [style.color]="dept.color" [style.border-color]="dept.color">{{ run.dept }}</span>
					}
				</button>
			}
		</wo-collapsible-section>
	</div>

	<div class="wo-rail__footer">
		<div class="wo-rail__sovereign">
			<i class="pi pi-shield"></i>
			<span class="wo-mono">self-hosted · data sovereign</span>
		</div>
		<div class="wo-rail__user">
			<wo-avatar-circle [initials]="userInitials()" color="#C84B31" [size]="24" />
			<div class="wo-rail__user-info">
				<p class="wo-rail__user-name wo-truncate">{{ userName() }}</p>
				<p class="wo-rail__user-pod wo-mono wo-truncate">{{ userPod() }}</p>
			</div>
			@if (authenticated()) {
				<button
					type="button"
					class="wo-rail__action wo-rail__logout"
					title="Log out"
					aria-label="Log out"
					(click)="logout()"
				>
					<i class="pi pi-sign-out"></i>
				</button>
			}
		</div>
	</div>
</aside>
