{{- /*
CONN.8 — k8s-native TLS issuance via cert-manager.

Renders a cert issuer + a wildcard Certificate so UserTenant Ingresses (which
reference ingress.tls.secretName) are served over browser-trusted TLS. Here
ingress.domain is the ClusterTenant base domain; a single wildcard *.<domain>
cert covers every UserTenant gateway host (<user>.<domain>) under it, so adding a
UserTenant needs no new issuance. (UserTenant = the per-user OpenClaw gateway, CRD
kind `Tenant`; ClusterTenant = the customer that owns the domain. See
docs/agents/cluster-architecture.md → "Tenancy Model — ClusterTenant vs UserTenant".)

- mode=selfSigned : dev/local — issues instantly, no DNS challenge, not browser-trusted.
- mode=acme       : production — public CA via DNS-01 (wildcards require DNS-01).

Issuer scope (brief B4, MI.4):
- legacy / `multiInstance.certIssuer=cluster` (DEFAULT): one cluster-singleton
  ClusterIssuer + a single wildcard Certificate in certificateNamespace.
- `multiInstance.enabled=true` + `multiInstance.certIssuer=namespaced`: a namespaced
  Issuer AND a wildcard Certificate are rendered in EACH owned instance namespace, so
  per-instance installs never collide on one cluster-singleton issuer. cert-manager
  reads a namespaced Issuer's solver Secret from the Issuer's OWN namespace, and an
  Ingress can only reference a TLS Secret in its own namespace, so issuer + cert + the
  wildcard Secret all co-locate per instance namespace.

Requires cert-manager (cert-manager.io/v1) installed in-cluster.
*/ -}}
{{- if .Values.certManager.enabled }}
{{- $cm := .Values.certManager }}
{{- $namespaced := eq (include "opencrane.namespacedCertIssuer" .) "true" }}
{{- if and (eq $cm.mode "acme") (empty $cm.acme.email) }}
{{- fail "certManager.mode=acme requires certManager.acme.email to be set." }}
{{- end }}
{{- if and (eq $cm.mode "acme") (empty $cm.acme.dns01.provider) }}
{{- fail "certManager.mode=acme requires certManager.acme.dns01.provider (wildcards need a DNS-01 solver)." }}
{{- end }}
{{- if not $namespaced }}
{{- /* Legacy / cluster mode: one ClusterIssuer + one Certificate in certificateNamespace. */ -}}
{{- $certNs := default .Release.Namespace $cm.certificateNamespace }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ $cm.issuerName | quote }}
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
spec:
{{- if eq $cm.mode "selfSigned" }}
  selfSigned: {}
{{- else if eq $cm.mode "acme" }}
  acme:
    server: {{ $cm.acme.server | quote }}
    email: {{ $cm.acme.email | quote }}
    privateKeySecretRef:
      name: {{ $cm.acme.privateKeySecretName | quote }}
    solvers:
      # DNS-01 for the platform names (wildcard `*.<domain>`, apex, control-plane host).
      # Wildcards REQUIRE DNS-01. Scoped by dnsZones to the platform base domain so per-org
      # VANITY hosts — which live in the CUSTOMER's own zone — do not match here and fall
      # through to the HTTP-01 solver below.
      - selector:
          dnsZones:
            - {{ $.Values.ingress.domain | quote }}
        dns01:
          {{- if $cm.acme.dns01.config }}
          {{- if eq $cm.acme.dns01.provider "clouddns" }}
          cloudDNS:
            {{- toYaml $cm.acme.dns01.config | nindent 12 }}
          {{- else }}
          {{ $cm.acme.dns01.provider }}:
            {{- toYaml $cm.acme.dns01.config | nindent 12 }}
          {{- end }}
          {{- end }}
      # HTTP-01 (catch-all) for per-org vanity hosts. The customer CNAMEs their host at the
      # ingress, so cert-manager answers the challenge over HTTP through the ingress — no
      # access to the customer's DNS zone is needed (DNS-01 there is impossible). The
      # operator's per-org vanity Certificate references THIS issuer — see
      # apps/fleet-operator/src/cluster-tenants/internal/org-domain.provisioner.ts.
      - http01:
          ingress:
            ingressClassName: {{ $.Values.ingress.className | default "nginx" | quote }}
{{- else }}
{{- fail (printf "certManager.mode must be 'selfSigned' or 'acme', got %q" $cm.mode) }}
{{- end }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.ingress.tls.secretName | quote }}
  namespace: {{ $certNs | quote }}
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
spec:
  # Secret cert-manager writes the issued cert into; tenant Ingresses reference it.
  secretName: {{ .Values.ingress.tls.secretName | quote }}
  issuerRef:
    name: {{ $cm.issuerName | quote }}
    kind: ClusterIssuer
  # Fixed-wildcard topology. The platform wildcard `*.<domain>` covers every org's
  # canonical gateway host `<org>.<domain>` (one label under the base); the base apex
  # `<domain>` is added for completeness, and the fixed control-plane host is added
  # explicitly so it is browser-trusted even when set to a name OUTSIDE `<domain>`.
  # There is NO per-org `*.<org>.<domain>` cert — every user in an org is served at the
  # SINGLE host `<org>.<domain>` via the gateway proxy. The only per-org cert is for an
  # optional customer-VANITY host, issued at provision time by the cluster-tenants operator
  # against this issuer's HTTP-01 solver (apps/fleet-operator/src/cluster-tenants/internal/org-domain.provisioner.ts).
  dnsNames:
    - {{ printf "*.%s" .Values.ingress.domain | quote }}
    {{- /* Apex SAN is opt-in: many installs use the bare domain as a marketing site
           hosted elsewhere and cannot serve `_acme-challenge.<domain>` from the
           platform's DNS-01 zone, which would stall issuance. Set
           certManager.includeApex=true only when the platform serves the apex. */}}
    {{- if .Values.certManager.includeApex }}
    - {{ .Values.ingress.domain | quote }}
    {{- end }}
    {{- $cpHost := .Values.ingress.controlPlaneHost | default (printf "platform.%s" .Values.ingress.domain) -}}
    {{- if and (ne $cpHost .Values.ingress.domain) (not (hasSuffix (printf ".%s" .Values.ingress.domain) $cpHost)) }}
    - {{ $cpHost | quote }}
    {{- end }}
{{- else }}
{{- /* Namespaced mode: a per-instance-namespace Issuer + wildcard Certificate. */ -}}
{{- $namespaces := include "opencrane.instanceNamespaces" . | fromJsonArray }}
{{- range $ns := $namespaces }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ $cm.issuerName | quote }}
  namespace: {{ $ns | quote }}
  labels:
    {{- include "opencrane.labels" $ | nindent 4 }}
spec:
{{- if eq $cm.mode "selfSigned" }}
  selfSigned: {}
{{- else if eq $cm.mode "acme" }}
  acme:
    server: {{ $cm.acme.server | quote }}
    email: {{ $cm.acme.email | quote }}
    privateKeySecretRef:
      name: {{ $cm.acme.privateKeySecretName | quote }}
    solvers:
      # DNS-01 for the platform names (wildcard `*.<domain>`, apex, control-plane host).
      # Wildcards REQUIRE DNS-01. Scoped by dnsZones to the platform base domain so per-org
      # VANITY hosts — which live in the CUSTOMER's own zone — do not match here and fall
      # through to the HTTP-01 solver below.
      - selector:
          dnsZones:
            - {{ $.Values.ingress.domain | quote }}
        dns01:
          {{- if $cm.acme.dns01.config }}
          {{- if eq $cm.acme.dns01.provider "clouddns" }}
          cloudDNS:
            {{- toYaml $cm.acme.dns01.config | nindent 12 }}
          {{- else }}
          {{ $cm.acme.dns01.provider }}:
            {{- toYaml $cm.acme.dns01.config | nindent 12 }}
          {{- end }}
          {{- end }}
      # HTTP-01 (catch-all) for per-org vanity hosts. The customer CNAMEs their host at the
      # ingress, so cert-manager answers the challenge over HTTP through the ingress — no
      # access to the customer's DNS zone is needed (DNS-01 there is impossible). The
      # operator's per-org vanity Certificate references THIS issuer — see
      # apps/fleet-operator/src/cluster-tenants/internal/org-domain.provisioner.ts.
      - http01:
          ingress:
            ingressClassName: {{ $.Values.ingress.className | default "nginx" | quote }}
{{- else }}
{{- fail (printf "certManager.mode must be 'selfSigned' or 'acme', got %q" $cm.mode) }}
{{- end }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $.Values.ingress.tls.secretName | quote }}
  namespace: {{ $ns | quote }}
  labels:
    {{- include "opencrane.labels" $ | nindent 4 }}
spec:
  # Secret cert-manager writes the issued cert into; tenant Ingresses reference it.
  secretName: {{ $.Values.ingress.tls.secretName | quote }}
  issuerRef:
    # Namespaced Issuer in this same namespace — never a cluster-singleton.
    name: {{ $cm.issuerName | quote }}
    kind: Issuer
  # Fixed-wildcard topology (see the legacy block above). `*.<domain>` covers each org's
  # canonical host `<org>.<domain>`; the base apex + the fixed control-plane host are added.
  # There is NO per-org `*.<org>.<domain>` cert — only an optional customer-vanity host gets
  # a per-org cert, issued by the operator against this issuer's HTTP-01 solver.
  dnsNames:
    - {{ printf "*.%s" $.Values.ingress.domain | quote }}
    {{- /* Apex SAN opt-in (see legacy block above for rationale). */}}
    {{- if $.Values.certManager.includeApex }}
    - {{ $.Values.ingress.domain | quote }}
    {{- end }}
    {{- $cpHost := $.Values.ingress.controlPlaneHost | default (printf "platform.%s" $.Values.ingress.domain) -}}
    {{- if and (ne $cpHost $.Values.ingress.domain) (not (hasSuffix (printf ".%s" $.Values.ingress.domain) $cpHost)) }}
    - {{ $cpHost | quote }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
