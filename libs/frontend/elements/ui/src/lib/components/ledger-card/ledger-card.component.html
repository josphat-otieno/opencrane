<div class="wo-ledger" [style.background]="style().bg" [style.border-left-color]="style().border">
	<span class="wo-ledger__id wo-mono" [style.color]="style().border">{{ entryId() }}</span>
	<div class="wo-ledger__body">
		<p class="wo-ledger__label" [class.wo-ledger__label--dimmed]="dimmed()">{{ label() }}</p>
		<div class="wo-ledger__meta">
			@if (scope(); as scopeLevel) {
				<wo-scope-chip [label]="scopeLevel" [color]="scopeColor()" />
			}
			@if (entryRef(); as refValue) {
				<span class="wo-ledger__ref wo-mono">{{ refValue }}</span>
			}
		</div>
	</div>
	@if (status(); as statusValue) {
		<span class="wo-ledger__status wo-mono" [style.color]="style().border" [style.border-color]="style().border">{{ statusValue }}</span>
	}
</div>
