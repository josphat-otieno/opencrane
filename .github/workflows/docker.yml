name: Build and push Docker images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  OPERATOR_IMAGE: ghcr.io/${{ github.repository_owner }}/opencrane-operator
  CONTROL_PLANE_IMAGE: ghcr.io/${{ github.repository_owner }}/opencrane-control-plane
  TENANT_IMAGE: ghcr.io/${{ github.repository_owner }}/opencrane-tenant
  SKILL_REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/opencrane-skill-registry

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test operator
        run: pnpm --filter @opencrane/fleet-manager test

      - name: Test control-plane
        run: pnpm --filter @opencrane/clustertenant-manager test

      - name: Test skill-registry
        run: pnpm --filter @opencrane/skill-registry test


  e2e-k3d:
    name: k3d e2e smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Run k3d e2e smoke test
        run: ./platform/tests/k3d-e2e.sh
        env:
          KEEP_CLUSTER: "0"
          TIMEOUT_SECONDS: "300"

  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    # Only push on commits to main; require both unit tests and e2e to pass
    needs: [test, e2e-k3d]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract image metadata (operator)
        id: meta-operator
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.OPERATOR_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push operator
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/fleet-manager/deploy/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-operator.outputs.tags }}
          labels: ${{ steps.meta-operator.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract image metadata (control-plane)
        id: meta-control-plane
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.CONTROL_PLANE_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push control-plane
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/clustertenant-manager/deploy/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-control-plane.outputs.tags }}
          labels: ${{ steps.meta-control-plane.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract image metadata (tenant)
        id: meta-tenant
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.TENANT_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push tenant
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/tenant/deploy/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-tenant.outputs.tags }}
          labels: ${{ steps.meta-tenant.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract image metadata (skill-registry)
        id: meta-skill-registry
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.SKILL_REGISTRY_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push skill-registry
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/skill-registry/deploy/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-skill-registry.outputs.tags }}
          labels: ${{ steps.meta-skill-registry.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
