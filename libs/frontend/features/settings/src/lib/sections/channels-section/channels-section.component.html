<wo-section-heading
	title="Harvest Channels"
	subtitle="Connectors that continuously index organisational knowledge into Cognee datasets. Role-based access controls what each pod can retrieve."
/>

<div class="wo-channels__list">
	@for (channel of channels; track channel.id) {
		<div class="wo-channels__row">
			<div class="wo-channels__glyph">{{ channel.icon }}</div>
			<div class="wo-channels__info">
				<p class="wo-channels__name">{{ channel.name }}</p>
				<div class="wo-channels__meta">
					<wo-scope-chip [label]="channel.scope" [color]="scopeColor(channel.scope)" />
					<span>→ {{ channel.dataset }}</span>
				</div>
			</div>
			<div class="wo-channels__stats">
				<p class="wo-mono">{{ channel.entries.toLocaleString() }} entries</p>
				<p>{{ channel.lastSync }}</p>
			</div>
			<div class="wo-channels__status" [style.color]="statusColor(channel)">
				@if (channel.status === "syncing") {
					<i class="pi pi-refresh wo-channels__spin"></i>
				} @else if (channel.status === "error") {
					<i class="pi pi-exclamation-triangle"></i>
				} @else {
					<span class="wo-channels__dot" [style.background]="statusColor(channel)"></span>
				}
				<span class="wo-mono">{{ channel.status }}</span>
			</div>
			<button type="button" class="wo-channels__open"><i class="pi pi-chevron-right"></i></button>
		</div>
	}
</div>

<button type="button" class="wo-dashed-button">
	<i class="pi pi-plus"></i>
	Add channel connector
</button>
