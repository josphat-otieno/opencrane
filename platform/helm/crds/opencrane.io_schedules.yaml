# OpenCrane keeps Schedule as a first-class CRD because the control-plane scheduler owns
# tenant dispatch cadence, auditability, and reconciliation state even when execution is
# delegated to another runtime component. OpenClaw consumes the rendered schedule contract.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: schedules.opencrane.io
spec:
  group: opencrane.io
  names:
    kind: Schedule
    listKind: ScheduleList
    plural: schedules
    singular: schedule
    shortNames:
      - sch
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - cron
                - tenantRef
              properties:
                description:
                  type: string
                  description: Human-readable description of the scheduled tenant job.
                tenantRef:
                  type: string
                  minLength: 1
                  description: Tenant name that the central scheduler dispatches as.
                cron:
                  type: string
                  minLength: 1
                  description: Standard cron expression for the dispatch cadence.
                timeZone:
                  type: string
                  description: Optional IANA time zone used when evaluating the cron schedule.
                enabled:
                  type: boolean
                  default: true
                job:
                  type: object
                  description: Job payload owned by the control-plane scheduler contract.
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                phase:
                  type: string
                nextRunAt:
                  type: string
                  format: date-time
                lastRunAt:
                  type: string
                  format: date-time
                lastReconciled:
                  type: string
                  format: date-time
                message:
                  type: string
      additionalPrinterColumns:
        - name: Tenant
          type: string
          jsonPath: .spec.tenantRef
        - name: Cron
          type: string
          jsonPath: .spec.cron
        - name: Enabled
          type: boolean
          jsonPath: .spec.enabled
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
