{{- if .Values.docs.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opencrane.fullname" . }}-docs
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: docs
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.docs.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "opencrane.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: docs
{{- end }}
