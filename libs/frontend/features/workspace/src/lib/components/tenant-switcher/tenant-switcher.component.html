@if (hasChoice()) {
	<p-select
		styleClass="wo-tenant-switcher__select"
		appendTo="body"
		name="tenant"
		[options]="tenantNames()"
		[ngModel]="activeName()"
		(ngModelChange)="onSelect($event)"
		[placeholder]="'Select tenant'">
		<ng-template #selectedItem let-name>
			<span class="wo-tenant-switcher__value wo-mono">
				<i class="pi pi-server"></i>
				{{ name }}
			</span>
		</ng-template>
		<ng-template #item let-name>
			<span class="wo-mono">{{ name }}</span>
		</ng-template>
	</p-select>
}
