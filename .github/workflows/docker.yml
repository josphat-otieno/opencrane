name: Build and push Docker images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Least-privilege default for every job (read-only). The build-and-push job overrides this
# with its own `packages: write` to publish images to GHCR.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  OPENCRANE_SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/opencrane-server
  TENANT_IMAGE: ghcr.io/${{ github.repository_owner }}/opencrane-openclaw-tenant
  SKILL_REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/opencrane-skills-registry
  OPENCRANE_UI_IMAGE: ghcr.io/${{ github.repository_owner }}/opencrane-ui

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # NX Cloud remote caching & distributed task execution
      # Uncomment to enable after running `npx nx connect` locally (writes nxCloudId to nx.json).
      # For PR events, this runs `npx nx affected` to test only changed packages.
      # - name: Initialize NX Cloud CI
      #   run: npx nx-cloud start-ci-run --distribute-on="3 linux-medium-js"

      - name: Build
        run: npm run build

      # `npm run build` regenerates the emitted OpenAPI specs and the typed
      # clients from source, then typechecks against the fresh output — so a
      # stale committed spec/client never fails the typecheck on its own.
      # Diff the regenerated artifacts to fail fast when codegen wasn't re-run
      # after a source change.
      - name: Verify generated specs and clients are up to date
        run: |
          git diff --exit-code -- \
            apps/opencrane/openapi.json \
            libs/contracts/src/generated/api.ts \
          || { echo "::error::Generated OpenAPI specs/clients are stale. Run 'npm run build' (or 'npm run generate -w @opencrane/contracts') and commit the result."; exit 1; }

      - name: Test all projects
        run: npx nx run-many -t test lint


  e2e-k3d:
    name: k3d e2e smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Run k3d e2e smoke test
        run: ./libs/k8s-platform/tests/k3d-e2e.sh
        env:
          KEEP_CLUSTER: "0"
          TIMEOUT_SECONDS: "300"

  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    # Only push on commits to main; require both unit tests and e2e to pass
    needs: [test, e2e-k3d]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract image metadata (opencrane-server)
        id: meta-opencrane-server
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.OPENCRANE_SERVER_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push opencrane-server
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/opencrane/deploy/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-opencrane-server.outputs.tags }}
          labels: ${{ steps.meta-opencrane-server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract image metadata (opencrane-openclaw-tenant)
        id: meta-opencrane-openclaw-tenant
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.TENANT_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push opencrane-openclaw-tenant
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/feat-openclaw-tenant/deploy/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-opencrane-openclaw-tenant.outputs.tags }}
          labels: ${{ steps.meta-opencrane-openclaw-tenant.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract image metadata (opencrane-skills-registry)
        id: meta-opencrane-skills-registry
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.SKILL_REGISTRY_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push opencrane-skills-registry
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/feat-skill-registry/deploy/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-opencrane-skills-registry.outputs.tags }}
          labels: ${{ steps.meta-opencrane-skills-registry.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract image metadata (opencrane-ui)
        id: meta-opencrane-ui
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.OPENCRANE_UI_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push opencrane-ui
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/opencrane-ui/deploy/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-opencrane-ui.outputs.tags }}
          labels: ${{ steps.meta-opencrane-ui.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
