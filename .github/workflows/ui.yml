name: Validate UI handoff

on:
  pull_request:
    paths:
      - "apps/opencrane-ui/**"
      - "apps/opencrane-ui-e2e/**"
      - "libs/frontend/**"
      - "package.json"
      - "package-lock.json"
      - "nx.json"
      - "tsconfig.json"
      - ".github/workflows/ui.yml"
  push:
    branches:
      - main
    paths:
      - "apps/opencrane-ui/**"
      - "apps/opencrane-ui-e2e/**"
      - "libs/frontend/**"
      - "package.json"
      - "package-lock.json"
      - "nx.json"
      - "tsconfig.json"
      - ".github/workflows/ui.yml"
  workflow_dispatch:

jobs:
  acceptance:
    name: Mock UI acceptance
    # Baselines are reviewed on macOS Chromium; keep rasterization stable in CI.
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Lint and test UI
        run: |
          npx nx run opencrane-ui:lint
          npx nx run opencrane-ui:test
          npm run lint:boundaries

      - name: Build production UI
        run: npx nx run opencrane-ui:build:production

      - name: Run mock UI acceptance
        run: |
          npx nx run opencrane-ui-e2e:e2e
          npx nx run opencrane-ui-e2e:visual

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opencrane-ui-playwright-${{ github.run_attempt }}
          path: |
            dist/apps/opencrane-ui-e2e/report
            dist/apps/opencrane-ui-e2e/results
          if-no-files-found: warn
          retention-days: 14
