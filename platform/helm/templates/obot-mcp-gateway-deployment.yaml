{{- if .Values.mcpGateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencrane.fullname" . }}-mcp-gateway
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-gateway
spec:
  replicas: {{ .Values.mcpGateway.replicas }}
  selector:
    matchLabels:
      {{- include "opencrane.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mcp-gateway
  template:
    metadata:
      labels:
        {{- include "opencrane.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mcp-gateway
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.mcpGateway.podSecurityContext | nindent 8 }}
      containers:
        - name: mcp-gateway
          image: "{{ .Values.mcpGateway.image.repository }}:{{ .Values.mcpGateway.image.tag }}"
          imagePullPolicy: {{ .Values.mcpGateway.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.mcpGateway.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.mcpGateway.service.port }}
          env:
            # Database — Obot requires a PostgreSQL DSN. Provide via the opencrane-obot secret.
            - name: OBOT_SERVER_DSN
              valueFrom:
                secretKeyRef:
                  name: opencrane-obot
                  key: dsn
            # Hostname — used by Obot for OAuth callbacks; set to the in-cluster service URL.
            - name: OBOT_SERVER_HOSTNAME
              value: "http://{{ include "opencrane.fullname" . }}-mcp-gateway.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.mcpGateway.service.port }}"
            # Disable authentication — Obot is in-cluster only; access is controlled by NetworkPolicy.
            - name: OBOT_SERVER_ENABLE_AUTHENTICATION
              value: "false"
            # MCP runtime backend — run MCP server containers as Kubernetes pods.
            - name: OBOT_SERVER_MCPRUNTIME_BACKEND
              value: "kubernetes"
            - name: OBOT_SERVER_MCPCLUSTER_DOMAIN
              value: "cluster.local"
            # No credential encryption at rest in the Phase 4 baseline.
            - name: OBOT_SERVER_ENCRYPTION_PROVIDER
              value: "none"
            # Control-plane registry — Obot polls this endpoint to sync the MCP server catalog
            # with OpenCrane McpServer rows. The control-plane exposes /api/internal/obot-registry
            # in Obot's /v0.1/servers format.
            - name: OBOT_SERVER_PROVIDER_REGISTRIES
              value: "http://{{ include "opencrane.fullname" . }}-control-plane.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.controlPlane.service.port }}/api/internal/obot-registry"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.mcpGateway.resources | nindent 12 }}
{{- end }}
