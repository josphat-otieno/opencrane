apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tenants.opencrane.io
spec:
  group: opencrane.io
  names:
    kind: Tenant
    listKind: TenantList
    plural: tenants
    singular: tenant
    shortNames:
      - tn
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [displayName, email]
              properties:
                displayName:
                  type: string
                  minLength: 1
                  description: Human-readable name for the tenant
                email:
                  type: string
                  pattern: '^[^ @]+@[^ @]+$'
                  description: Tenant email address
                team:
                  type: string
                  description: Team the tenant belongs to
                openclawImage:
                  type: string
                  description: Override the default OpenClaw container image
                openclawVersion:
                  type: string
                  description: OpenClaw version to install (e.g. latest, 2026.3.15). Defaults to latest.
                monthlyBudgetUsd:
                  type: number
                  minimum: 0
                  description: Monthly budget cap in USD used for LiteLLM virtual key provisioning.
                resources:
                  type: object
                  properties:
                    cpu:
                      type: string
                    memory:
                      type: string
                skillAllowlist:
                  type: array
                  items:
                    type: string
                  description: >-
                    Durable per-tenant skill name allowlist. When present, only skills
                    in this list are linked at startup and injected through OPENCRANE_ALLOWED_SKILLS.
                mcpPolicy:
                  type: object
                  description: >-
                    Per-tenant MCP server allow/deny policy applied at invocation level.
                    This is the durable MCP policy surface consumed by tenant runtimes.
                  properties:
                    allow:
                      type: array
                      items:
                        type: string
                      description: MCP server names explicitly allowed for this tenant.
                    deny:
                      type: array
                      items:
                        type: string
                      description: MCP server names explicitly denied for this tenant.
                channels:
                  type: array
                  description: Adapter-oriented channel integration configuration.
                  items:
                    type: object
                    required:
                      - adapter
                    properties:
                      adapter:
                        type: string
                        description: Adapter identifier (e.g. slack, whatsapp, teams, sharepoint).
                      config:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                        description: Adapter-specific configuration payload.
                      credentialsSecretName:
                        type: string
                        description: Kubernetes Secret name containing adapter credentials.
                configOverrides:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  description: OpenClaw config values merged into base config
                policyRef:
                  type: string
                  description: Name of the AccessPolicy CR to apply
                clusterTenantRef:
                  type: string
                  description: >-
                    Optional name of the parent ClusterTenant (the first-class customer /
                    isolation unit this openclaw belongs to). When set, the operator resolves
                    the parent's bound namespace and compute/quota policy and deploys the openclaw
                    there. When absent, the openclaw attaches to the implicit default cluster
                    tenant bound to the install namespace, so single-install behaviour is unchanged
                    and multi-tenancy stays opt-in.
                suspended:
                  type: boolean
                  default: false
                  description: Suspend the tenant pod without deleting state
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Suspended, Error]
                podName:
                  type: string
                ingressHost:
                  type: string
                message:
                  type: string
                effectivePolicyRef:
                  type: string
                policyResolutionSource:
                  type: string
                policyResolutionState:
                  type: string
                lastReconciled:
                  type: string
                  format: date-time
                observedGeneration:
                  type: integer
                  format: int64
                  description: >-
                    metadata.generation the operator last drove to Running. The reconcile-skip
                    guard compares this against metadata.generation so an unchanged, already-
                    running Tenant is not re-provisioned on every watch replay. MUST be present
                    in the schema or the API server prunes it from status writes, defeating the
                    guard and re-reconciling on every watch cycle — which, because each reconcile
                    writes status (lastReconciled), self-triggers an endless MODIFIED → reconcile
                    loop.
      additionalPrinterColumns:
        - name: Display Name
          type: string
          jsonPath: .spec.displayName
        - name: Team
          type: string
          jsonPath: .spec.team
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Host
          type: string
          jsonPath: .status.ingressHost
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
