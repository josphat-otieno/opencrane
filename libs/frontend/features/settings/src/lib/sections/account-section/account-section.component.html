<wo-section-heading title="Account" subtitle="Your identity and org membership." />

<wo-settings-row label="Full name">
	<input type="text" class="wo-text-input" [value]="fullName()" />
</wo-settings-row>

<wo-settings-row label="Email" hint="Managed by your org identity provider.">
	<p class="wo-account__readonly wo-mono">{{ email() }}</p>
</wo-settings-row>

<wo-settings-row label="Department">
	<select class="wo-select">
		@for (option of departments; track option) {
			<option [selected]="option === department()">{{ option }}</option>
		}
	</select>
</wo-settings-row>

<wo-settings-row label="Workload Identity" hint="GCP service account used by your pod for IAM-authenticated requests.">
	<p class="wo-account__readonly wo-mono">alex-oc&#64;acme-corp.iam.gserviceaccount.com</p>
</wo-settings-row>

<wo-settings-row label="Notification preferences">
	<div class="wo-account__prefs">
		@for (preference of notificationPreferences; track preference) {
			<div class="wo-account__pref">
				<span>{{ preference }}</span>
				<wo-toggle-field [defaultOn]="true" />
			</div>
		}
	</div>
</wo-settings-row>

<wo-save-button />
