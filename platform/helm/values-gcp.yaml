# GCP-specific value overrides for OpenCrane on GKE

global:
  # Use non-dev validation rules for cloud installs.
  environment: prod

tenant:
  storage:
    provider: gcs
    bucketPrefix: opencrane
    csiDriver: gcsfuse.csi.storage.gke.io
    gcpProject: "replace-with-gcp-project-id"  # Set per environment

ingress:
  className: gce
  annotations:
    kubernetes.io/ingress.class: gce

controlPlane:
  database:
    # In-cluster PostgreSQL — secret created by Terraform app-deploy module
    existingSecret: opencrane-db
    secretKey: DATABASE_URL

litellm:
  enabled: true
  endpoint: http://litellm:4000
  # Provide this Secret via External Secrets or pre-create it manually.
  # Required key: LITELLM_MASTER_KEY
  existingSecret: opencrane-litellm
  generateMasterKey: false
  existingDatabaseSecret: opencrane-db
  databaseSecretKey: DATABASE_URL

crossplane:
  enabled: true
  provider: gcp

externalSecrets:
  enabled: true
  provider: gcp-secret-manager

observability:
  cloudLogging: true
  cloudErrorReporting: true
