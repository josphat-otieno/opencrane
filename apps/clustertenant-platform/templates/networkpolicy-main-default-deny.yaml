{{- if and .Values.multiCt.enabled (not .Values.networkPolicy.mainNetworkDefaultDeny.enabled) }}
{{- fail "multiCt.enabled=true requires networkPolicy.mainNetworkDefaultDeny.enabled=true: the platform-namespace default-deny (control-plane, LiteLLM, Cognee, Obot, skill-registry) is mandatory under a multi-ClusterTenant install — a shared platform namespace serving many ClusterTenants must never stay open by default. Set networkPolicy.mainNetworkDefaultDeny.enabled=true (after validating plane-to-plane connectivity per the values.yaml note), or drop the --multi-ct profile for a single-tenant box." }}
{{- end }}
{{- if and .Values.networkPolicy.enabled (or .Values.networkPolicy.mainNetworkDefaultDeny.enabled .Values.multiCt.enabled) }}
{{- /*
  Platform-namespace default-deny (values.yaml networkPolicy.mainNetworkDefaultDeny, #151
  item 3 / scout gap (c)).

  CONTEXT: the operator emits a per-silo default-deny into each ClusterTenant's own namespace
  at runtime (_BuildSiloBaselineNetworkPolicy). This template is the missing counterpart for
  the PLATFORM namespace itself — where control-plane, LiteLLM, Cognee, Obot (mcp-gateway),
  skill-registry, and skill-oci-store run — which had no default-deny before this change: the
  per-component ingress policies in networkpolicy-planes.yaml scope specific ports on specific
  pods, but nothing stopped an arbitrary pod in this namespace from reaching another on an
  unlisted port, or reaching out to an arbitrary destination.

  RELATION TO OTHER POLICIES: networkpolicy-planes.yaml + clustertenant-manager-ingress.yaml
  remain the precise, per-port allow-lists; this template is the coarse belt-and-suspenders
  floor underneath them. networkpolicy-multi-instance.yaml is the CROSS-instance/cross-silo
  floor (a different namespace boundary); this one is INTRA-namespace.

  GATE: `enabled` defaults to FALSE (see values.yaml for the staged validation rollout this
  flag expects before flipping it on in production). MANDATORY (see the `fail` guard above)
  once `multiCt.enabled=true`.

  FQDN-BASED EGRESS: rule 7 allows port 443 to ANY external destination (conservative — a
  NetworkPolicy cannot match on FQDN). Replace with CiliumNetworkPolicy scoped to
  networkPolicy.defaultAllowedDomains / your Zitadel host if the cluster runs Cilium.
*/}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "opencrane.fullname" . }}-platform-default-deny
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: platform-default-deny
spec:
  # Empty podSelector → applies to every pod in the platform namespace.
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 1. Platform pod ↔ platform pod: the runtime planes call each other constantly
    #    (control-plane -> litellm/cognee/obot/skill-registry, cognee -> litellm, etc.);
    #    re-allow all of that under the default-deny rather than re-deriving every pairwise
    #    port (networkpolicy-planes.yaml already enforces the precise per-port allow-lists).
    - from:
        - podSelector:
            matchLabels:
              {{- include "opencrane.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: clustertenant-manager
        - podSelector:
            matchLabels:
              {{- include "opencrane.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: litellm
        - podSelector:
            matchLabels:
              {{- include "opencrane.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: cognee
        - podSelector:
            matchLabels:
              {{- include "opencrane.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: mcp-gateway
        - podSelector:
            matchLabels:
              {{- include "opencrane.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: skill-registry
        - podSelector:
            matchLabels:
              {{- include "opencrane.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: skill-oci-store
        - podSelector:
            matchLabels:
              {{- include "opencrane.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: control-plane-spa
    # 2. Tenant pods (a different namespace's watch target, but may share this namespace in
    #    single-namespace installs) -> control-plane, INTERNAL port only. Identity is enforced
    #    by TokenReview inside the handler (see clustertenant-manager-ingress.yaml); this rule
    #    is the coarse backstop so that path survives the default-deny.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: tenant
      ports:
        - protocol: TCP
          port: {{ .Values.clustertenantManager.service.internalPort }}
    # 3. Cluster ingress controller -> control-plane, PUBLIC port (external API traffic).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace | default "ingress-nginx" }}
      ports:
        - protocol: TCP
          port: {{ .Values.clustertenantManager.service.port }}
    # 4. Fleet-manager -> control-plane, PUBLIC port (cross-silo ops in the fleet-managed
    #    topology; a no-op allow in standalone installs where no fleet-manager pod exists).
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: fleet-manager
      ports:
        - protocol: TCP
          port: {{ .Values.clustertenantManager.service.port }}
  egress:
    # 5. Reciprocal platform pod -> platform pod (see ingress rule 1).
    - to:
        - podSelector:
            matchLabels:
              {{- include "opencrane.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: clustertenant-manager
        - podSelector:
            matchLabels:
              {{- include "opencrane.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: litellm
        - podSelector:
            matchLabels:
              {{- include "opencrane.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: cognee
        - podSelector:
            matchLabels:
              {{- include "opencrane.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: mcp-gateway
        - podSelector:
            matchLabels:
              {{- include "opencrane.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: skill-registry
        - podSelector:
            matchLabels:
              {{- include "opencrane.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: skill-oci-store
        - podSelector:
            matchLabels:
              {{- include "opencrane.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: control-plane-spa
    {{- if .Values.networkPolicy.allowDNS }}
    # 6. DNS resolution (cluster DNS lives outside this namespace).
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- end }}
    # 7. HTTPS to external LLM-provider / IAM APIs (OpenAI, Anthropic, Zitadel, ...).
    - ports:
        - protocol: TCP
          port: 443
    {{- if and .Values.observability.otel.enabled .Values.networkPolicy.mainNetworkDefaultDeny.allowOtelEgress }}
    # 8. OTEL collector egress (observability.otel.enabled AND allowOtelEgress both true).
    - ports:
        - protocol: TCP
          port: {{ .Values.observability.otel.collector.otlpPort }}
    {{- end }}
{{- end }}
