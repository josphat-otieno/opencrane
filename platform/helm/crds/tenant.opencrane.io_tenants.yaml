apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tenants.opencrane.io
spec:
  group: opencrane.io
  names:
    kind: Tenant
    listKind: TenantList
    plural: tenants
    singular: tenant
    shortNames:
      - tn
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [displayName, email]
              properties:
                displayName:
                  type: string
                  minLength: 1
                  description: Human-readable name for the tenant
                email:
                  type: string
                  pattern: '^[^ @]+@[^ @]+$'
                  description: Tenant email address
                team:
                  type: string
                  description: Team the tenant belongs to
                openclawImage:
                  type: string
                  description: Override the default OpenClaw container image
                openclawVersion:
                  type: string
                  description: OpenClaw version to install (e.g. latest, 2026.3.15). Defaults to latest.
                monthlyBudgetUsd:
                  type: number
                  minimum: 0
                  description: Monthly budget cap in USD used for LiteLLM virtual key provisioning.
                resources:
                  type: object
                  properties:
                    cpu:
                      type: string
                    memory:
                      type: string
                skills:
                  type: array
                  items:
                    type: string
                  description: Skill paths to mount from the shared volume
                skillAllowlist:
                  type: array
                  items:
                    type: string
                  description: >-
                    Durable per-tenant skill name allowlist. When present, only skills
                    in this list are linked at startup. Takes precedence over the OPENCRANE_ALLOWED_SKILLS env var.
                    Use this field instead of spec.skills for auditable skill governance.
                mcpPolicy:
                  type: object
                  description: >-
                    Per-tenant MCP server allow/deny policy applied at invocation level.
                    Complements the AccessPolicy mcpServers field with tenant-specific overrides.
                  properties:
                    allow:
                      type: array
                      items:
                        type: string
                      description: MCP server names explicitly allowed for this tenant.
                    deny:
                      type: array
                      items:
                        type: string
                      description: MCP server names explicitly denied for this tenant.
                channels:
                  type: object
                  description: Channel configuration for tenant communication integrations.
                  properties:
                    slack:
                      type: object
                      description: Slack workspace and channel configuration.
                      properties:
                        workspaceId:
                          type: string
                          description: Slack workspace/team ID (xoxb-... prefix value).
                        channelId:
                          type: string
                          description: Slack channel ID where the tenant bot posts status (C...).
                        botTokenSecretName:
                          type: string
                          description: Name of the Kubernetes Secret containing the Slack bot token.
                    whatsapp:
                      type: object
                      description: WhatsApp Business API channel configuration.
                      properties:
                        phoneNumber:
                          type: string
                          description: WhatsApp phone number in E.164 format (e.g. "+15551234567").
                        credentialsSecretName:
                          type: string
                          description: Name of the Kubernetes Secret containing WhatsApp API credentials.
                configOverrides:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  description: OpenClaw config values merged into base config
                policyRef:
                  type: string
                  description: Name of the AccessPolicy CR to apply
                suspended:
                  type: boolean
                  default: false
                  description: Suspend the tenant pod without deleting state
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Suspended, Error]
                podName:
                  type: string
                ingressHost:
                  type: string
                message:
                  type: string
                lastReconciled:
                  type: string
                  format: date-time
      additionalPrinterColumns:
        - name: Display Name
          type: string
          jsonPath: .spec.displayName
        - name: Team
          type: string
          jsonPath: .spec.team
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Host
          type: string
          jsonPath: .status.ingressHost
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
