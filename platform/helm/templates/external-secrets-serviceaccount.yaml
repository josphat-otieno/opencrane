{{- /*
ServiceAccount the external-secrets (Cluster)SecretStore's Workload-Identity ref points
at. external-secrets-store.yaml references `<fullname>-external-secrets` as the WI
serviceAccountRef but never rendered it — so the store had a dangling SA ref and could
not authenticate. This template renders it, matching the store's scope:

- legacy / cluster store (DEFAULT): a single SA in the release namespace, referenced by
  the ClusterSecretStore.
- namespaced store (multiInstance + secretStore=namespaced): one SA per owned instance
  namespace, since a namespaced SecretStore can only reference a SA in its own namespace.

Only rendered for the gcp-secret-manager provider in instance mode (the shared-store mode
binds an externally-managed store + SA), matching external-secrets-store.yaml exactly.
*/ -}}
{{- if and .Values.externalSecrets.enabled (ne (include "opencrane.externalSecretsShared" .) "true") }}
{{- if eq .Values.externalSecrets.provider "gcp-secret-manager" }}
{{- $namespaced := eq (include "opencrane.namespacedSecretStore" .) "true" }}
{{- $saName := printf "%s-external-secrets" (include "opencrane.fullname" .) }}
{{- $annotations := .Values.externalSecrets.serviceAccountAnnotations }}
{{- if not $namespaced }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $saName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- else }}
{{- range $ns := include "opencrane.instanceNamespaces" $ | fromJsonArray }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $saName }}
  namespace: {{ $ns | quote }}
  labels:
    {{- include "opencrane.labels" $ | nindent 4 }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
