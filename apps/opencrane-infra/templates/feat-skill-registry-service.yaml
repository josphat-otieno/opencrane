{{- /* Service only exists for the release-local (instance-scoped) feat-skill-registry. A
       shared registry lives outside this release, reached via opencrane.skillRegistryUrl. */ -}}
{{- if and .Values.skillRegistry.enabled (ne (include "opencrane.skillRegistryShared" .) "true") }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opencrane.fullname" . }}-feat-skill-registry
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: feat-skill-registry
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.skillRegistry.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "opencrane.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: feat-skill-registry
{{- end }}
