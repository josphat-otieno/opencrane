<div class="wo-tent" [class.wo-tent--error]="errored()" [class.wo-tent--open]="open()">
	@if (fileArtifact(); as file) {
		<!-- File-bearing call: show the file name and portal its content to the side panel. -->
		<button type="button" class="wo-tent__row wo-tent__row--file" (click)="openFile(file)">
			<i class="pi wo-tent__icon" [class.pi-file]="!errored()" [class.pi-exclamation-triangle]="errored()"></i>
			<span class="wo-tent__name wo-mono">{{ card().label }}</span>
			<span class="wo-tent__detail wo-mono wo-truncate">{{ file.name }}</span>
			<i class="pi pi-arrow-up-right wo-tent__portal"></i>
			@if (card().status) {
				<span class="wo-tent__status wo-mono">{{ card().status }}</span>
			}
		</button>
	} @else {
		<button type="button" class="wo-tent__row" (click)="toggle()" [disabled]="!hasBody()">
			@if (hasBody()) {
				<i class="pi wo-tent__caret" [class.pi-chevron-right]="!open()" [class.pi-chevron-down]="open()"></i>
			}
			<i class="pi wo-tent__icon" [class.pi-wrench]="!errored()" [class.pi-exclamation-triangle]="errored()"></i>
			<span class="wo-tent__name wo-mono">{{ card().label }}</span>
			@if (detail()) {
				<span class="wo-tent__detail wo-mono wo-truncate">{{ detail() }}</span>
			}
			@if (card().status) {
				<span class="wo-tent__status wo-mono">{{ card().status }}</span>
			}
		</button>

		@if (open()) {
			<div class="wo-tent__body">
				@if (inputMarkdown()) {
					<div class="wo-tent__block">
						<span class="wo-tent__block-label wo-mono">Input</span>
						<div class="wo-tent__code" woCopyCode [innerHTML]="inputMarkdown() | woMarkdown"></div>
					</div>
				}
				@if (outputMarkdown()) {
					<div class="wo-tent__block">
						<span class="wo-tent__block-label wo-mono">{{ errored() ? "Error" : "Output" }}</span>
						<div class="wo-tent__code" woCopyCode [innerHTML]="outputMarkdown() | woMarkdown"></div>
					</div>
				}
			</div>
		}
	}
</div>
