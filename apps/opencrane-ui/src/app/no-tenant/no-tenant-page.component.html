<main class="wo-no-tenant">
	<p-card styleClass="wo-no-tenant__card">
		<p class="wo-no-tenant__eyebrow">OpenCrane Operator</p>
		<h1 class="wo-no-tenant__title wo-serif">No tenant yet.</h1>
		<p class="wo-no-tenant__sub">
			Your account is signed in, but no workspace tenant has been provisioned for you in this org. Please talk to your admin or support.
		</p>
		<div class="wo-no-tenant__paths">
			<p-button
				label="Log out"
				icon="pi pi-sign-out"
				styleClass="wo-no-tenant__btn"
				severity="secondary"
				[outlined]="true"
				size="large"
				(onClick)="logout()"
			/>
		</div>
	</p-card>
</main>
