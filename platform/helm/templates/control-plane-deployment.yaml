apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencrane.fullname" . }}-control-plane
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  replicas: {{ .Values.controlPlane.replicas }}
  selector:
    matchLabels:
      {{- include "opencrane.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        {{- include "opencrane.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: control-plane
    spec:
      serviceAccountName: {{ include "opencrane.fullname" . }}-control-plane
      initContainers:
        # Apply pending Prisma migrations before the server starts (prisma migrate
        # deploy). Runs the same image so the schema/migrations match the binary;
        # the server never boots against an un-migrated database. Idempotent — a
        # no-op when the DB is already at the latest migration. This is a
        # belt-and-suspenders guard for pod (re)creation BETWEEN deploys: the
        # deploy-time migration authority is the pre-upgrade hook Job
        # (control-plane-migration-job.yaml), which an unchanged `helm upgrade`
        # cannot skip the way it skips an unchanged pod template.
        - name: db-migrate
          image: "{{ .Values.controlPlane.image.repository }}:{{ .Values.controlPlane.image.tag }}"
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          command: ["node", "apps/control-plane/dist/scripts/migrate.js"]
          env:
            {{- if .Values.controlPlane.database.existingSecret }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controlPlane.database.existingSecret }}
                  key: {{ .Values.controlPlane.database.secretKey }}
            {{- else if .Values.controlPlane.database.url }}
            - name: DATABASE_URL
              value: {{ .Values.controlPlane.database.url | quote }}
            {{- end }}
      containers:
        - name: control-plane
          image: "{{ .Values.controlPlane.image.repository }}:{{ .Values.controlPlane.image.tag }}"
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.controlPlane.service.port }}
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PORT
              value: {{ .Values.controlPlane.service.port | quote }}
            {{- include "opencrane.observabilityEnv" (dict "ctx" $ "component" "control-plane") | nindent 12 }}
            - name: INGRESS_DOMAIN
              value: {{ .Values.ingress.domain | quote }}
            {{- if .Values.certManager.enabled }}
            # cert-manager namespace the `oc platform dns set` endpoint writes the
            # DNS-01 credentials Secret into (must match the namespaced RBAC Role).
            - name: CERT_MANAGER_NAMESPACE
              value: {{ default "cert-manager" .Values.certManager.namespace | quote }}
            {{- if eq (include "opencrane.namespacedCertIssuer" .) "true" }}
            # MI.4 namespaced cert-issuer mode: `oc platform dns set` upserts a
            # per-instance *Issuer* and writes the DNS-01 Secret INTO this pod's own
            # namespace (NAMESPACE, above), not a cluster-wide ClusterIssuer + shared
            # cert-manager ns — so two instances never collide. The namespace is left
            # to the runtime NAMESPACE default; only the kind is forced here.
            - name: PLATFORM_DNS_ISSUER_KIND
              value: "Issuer"
            {{- end }}
            {{- end }}
            {{- if .Values.skillRegistry.ociStore.enabled }}
            # OCI (Zot) store for skill-bundle content (P4D.2). When set, the control
            # plane pushes published bundles here and serves delivery by digest from it,
            # falling back to the DB `content` column until the destructive cutover lands.
            - name: SKILL_OCI_REGISTRY_URL
              value: "http://{{ include "opencrane.fullname" . }}-skill-oci.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.skillRegistry.ociStore.service.port }}"
            - name: SKILL_OCI_REPOSITORY
              value: {{ .Values.skillRegistry.ociStore.repository | quote }}
            {{- end }}
            - name: COGNEE_ENDPOINT
              value: {{ .Values.controlPlane.cognee.endpoint | quote }}
            - name: COGNEE_PERMISSIONS_TIMEOUT_MS
              value: {{ .Values.controlPlane.cognee.permissionsTimeoutMs | quote }}
            - name: COGNEE_ENABLE_BACKEND_ACCESS_CONTROL
              value: {{ ternary "true" "false" .Values.controlPlane.cognee.backendAccessControl | quote }}
            # -- Tenancy profile (Chunk 4). Multi-tenant (default): self-service billing +
            #    ClusterTenant management are exposed. Single-tenant: both false and ONE org
            #    is seeded directly (the OPENCRANE_SEED_CLUSTER_TENANT_* env below).
            - name: OPENCRANE_BILLING_ENABLED
              value: {{ ternary "true" "false" .Values.billing.enabled | quote }}
            - name: OPENCRANE_CLUSTER_TENANT_MANAGER_ENABLED
              value: {{ ternary "true" "false" .Values.clusterTenantManager.enabled | quote }}
            {{- if .Values.clusterTenant.seed.name }}
            # -- Single-tenant org seed. Read at boot by _SeedClusterTenant: creates the
            #    ClusterTenant CR + its `owner` OrgMembership directly (idempotent,
            #    fail-soft). Only rendered when a seed name is configured.
            - name: OPENCRANE_SEED_CLUSTER_TENANT_NAME
              value: {{ .Values.clusterTenant.seed.name | quote }}
            - name: OPENCRANE_SEED_CLUSTER_TENANT_DISPLAY_NAME
              value: {{ .Values.clusterTenant.seed.displayName | default .Values.clusterTenant.seed.name | quote }}
            - name: OPENCRANE_SEED_CLUSTER_TENANT_OWNER_EMAIL
              value: {{ .Values.clusterTenant.seed.ownerEmail | quote }}
            - name: OPENCRANE_SEED_CLUSTER_TENANT_TIER
              value: {{ .Values.clusterTenant.seed.tier | quote }}
            {{- end }}
            {{- with .Values.controlPlane.oidc }}
            {{- if .issuerUrl }}
            # -- OIDC human-login session (control-plane only). Rendered iff issuerUrl is
            #    set; otherwise the control-plane stays in token/development auth mode.
            #    Zitadel is the single trusted issuer (Mode-2 broker, no upstream Entra) —
            #    standards-only, so any spec-compliant issuer at OIDC_ISSUER_URL works.
            - name: OIDC_ISSUER_URL
              value: {{ .issuerUrl | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .clientId | quote }}
            - name: OIDC_REDIRECT_URI
              value: {{ .redirectUri | quote }}
            {{- if .existingSecret }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .existingSecret }}
                  key: {{ .clientSecretKey }}
            - name: OIDC_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .existingSecret }}
                  key: {{ .sessionSecretKey }}
            {{- else }}
            {{- if .clientSecret }}
            - name: OIDC_CLIENT_SECRET
              value: {{ .clientSecret | quote }}
            {{- end }}
            {{- if .sessionSecret }}
            - name: OIDC_SESSION_SECRET
              value: {{ .sessionSecret | quote }}
            {{- end }}
            {{- end }}
            {{- if .groupsClaim }}
            - name: OIDC_GROUPS_CLAIM
              value: {{ .groupsClaim | quote }}
            {{- end }}
            {{- if .rolesClaim }}
            - name: OIDC_ROLES_CLAIM
              value: {{ .rolesClaim | quote }}
            {{- end }}
            {{- if .platformOperatorGroups }}
            - name: OPENCRANE_PLATFORM_OPERATOR_GROUPS
              value: {{ .platformOperatorGroups | quote }}
            {{- end }}
            {{- if .orgAdminGroups }}
            - name: OPENCRANE_ORG_ADMIN_GROUPS
              value: {{ .orgAdminGroups | quote }}
            {{- end }}
            {{- if .platformOperatorSeedEmail }}
            # -- Per-cluster platform-operator SEED. A caller whose VERIFIED email equals
            #    this becomes a platform operator (OR-ed with the group check). Empty →
            #    rendered as no env var, so the seed grants operator to NOBODY (fail-closed).
            - name: OPENCRANE_PLATFORM_OPERATOR_SEED_EMAIL
              value: {{ .platformOperatorSeedEmail | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            # -- LiteLLM base endpoint, resolved via sharedPlatform scope (B5):
            #    instance mode → release-prefixed in-cluster Service; shared mode →
            #    sharedPlatform.litellm.shared.endpoint.
            - name: LITELLM_ENDPOINT
              value: {{ include "opencrane.litellmEndpoint" . | quote }}
            - name: LITELLM_SPEND_PATH_TEMPLATE
              value: {{ .Values.litellm.spendPathTemplate | quote }}
            {{- if .Values.litellm.enabled }}
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.litellm.existingSecret }}
                  name: {{ .Values.litellm.existingSecret }}
                  {{- else }}
                  name: {{ include "opencrane.fullname" . }}-litellm
                  {{- end }}
                  key: {{ .Values.litellm.secretKey }}
            {{- end }}
            {{- if .Values.controlPlane.database.existingSecret }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controlPlane.database.existingSecret }}
                  key: {{ .Values.controlPlane.database.secretKey }}
            {{- else if .Values.controlPlane.database.url }}
            - name: DATABASE_URL
              value: {{ .Values.controlPlane.database.url | quote }}
            {{- end }}
            {{- if .Values.clusterTenant.provisionerWebhook.url }}
            - name: CLUSTER_TENANT_PROVISIONER_WEBHOOK_URL
              value: {{ .Values.clusterTenant.provisionerWebhook.url | quote }}
            {{- if .Values.clusterTenant.provisionerWebhook.id }}
            - name: CLUSTER_TENANT_PROVISIONER_WEBHOOK_ID
              value: {{ .Values.clusterTenant.provisionerWebhook.id | quote }}
            {{- end }}
            {{- if .Values.clusterTenant.provisionerWebhook.existingSecret }}
            - name: CLUSTER_TENANT_PROVISIONER_WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.clusterTenant.provisionerWebhook.existingSecret }}
                  key: {{ .Values.clusterTenant.provisionerWebhook.secretKey }}
            {{- end }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
