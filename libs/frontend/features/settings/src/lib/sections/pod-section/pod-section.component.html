<wo-section-heading title="Pod & Session" subtitle="Your isolated OpenClaw instance running on acme-corp infrastructure." />

<wo-settings-row label="Pod ID" hint="Read-only. Assigned by OpenCrane operator.">
	<p class="wo-pod__readonly wo-mono">{{ podId() }}</p>
</wo-settings-row>

<wo-settings-row label="Display name">
	<input type="text" class="wo-text-input" [value]="displayName()" />
</wo-settings-row>

@if (phase()) {
	<wo-settings-row label="Phase" hint="Lifecycle state reported by the OpenCrane operator.">
		<p class="wo-pod__readonly wo-mono">{{ phase() }}</p>
	</wo-settings-row>
}

<wo-settings-row label="OpenClaw version" hint="Pin to a specific version or track latest.">
	<div class="wo-pod__version">
		<input type="text" class="wo-text-input wo-mono" value="2026.3.15" />
		<span>latest: 2026.5.28</span>
	</div>
</wo-settings-row>

<wo-settings-row label="Storage" hint="Encrypted GCS bucket. Private — OpenCrane operator cannot read contents.">
	<div class="wo-pod__storage">
		<span class="wo-pod__bucket">alex-oc-storage.acme-corp.internal</span>
		<div class="wo-pod__stats">
			@for (stat of storageStats; track stat.label) {
				<div>
					<p class="wo-pod__stat-label">{{ stat.label }}</p>
					<p class="wo-pod__stat-value wo-mono">{{ stat.value }}</p>
				</div>
			}
		</div>
	</div>
</wo-settings-row>

<wo-settings-row label="Auto-update" hint="Allow OpenCrane operator to apply patch updates automatically.">
	<wo-toggle-field [defaultOn]="true" label="Enabled" />
</wo-settings-row>

<wo-save-button />
