{{- /*
External-secrets store for syncing cloud-vault secrets into the cluster.

Store scope (brief B4, MI.4):
- legacy / `multiInstance.secretStore=cluster` (DEFAULT): one cluster-singleton
  ClusterSecretStore, usable from any namespace.
- `multiInstance.enabled=true` + `multiInstance.secretStore=namespaced`: a namespaced
  SecretStore is rendered in EACH owned instance namespace, so per-instance installs
  never collide on one cluster-singleton store and each instance binds its own
  Workload Identity ServiceAccount.

Component scope (brief B5, MI.5): when `sharedPlatform.externalSecrets.mode=shared`
the install binds to an externally-managed ClusterSecretStore
(`sharedPlatform.externalSecrets.shared.secretStoreName`), so NO store is rendered here.
*/ -}}
{{- if and .Values.externalSecrets.enabled (ne (include "opencrane.externalSecretsShared" .) "true") }}
{{- if eq .Values.externalSecrets.provider "gcp-secret-manager" }}
{{- $namespaced := eq (include "opencrane.namespacedSecretStore" .) "true" }}
{{- $projectID := required "hosting.gcp.projectId is required for gcp-secret-manager" .Values.hosting.gcp.projectId }}
{{- /* GKE cluster location (region or zone) for the Workload Identity binding.
       Optional: when empty, external-secrets falls back to GKE metadata-server
       discovery, which works for in-cluster Workload Identity. */ -}}
{{- $clusterLocation := .Values.hosting.gcp.clusterLocation | default "" }}
{{- $saName := printf "%s-external-secrets" (include "opencrane.fullname" .) }}
{{- if not $namespaced }}
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ include "opencrane.fullname" . }}-gcp-secret-manager
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
spec:
  provider:
    gcpsm:
      projectID: {{ $projectID }}
      auth:
        workloadIdentity:
          clusterLocation: {{ $clusterLocation | quote }}
          clusterName: ""
          serviceAccountRef:
            name: {{ $saName }}
            namespace: {{ .Release.Namespace }}
{{- else }}
{{- /* A namespaced SecretStore + its Workload Identity SA ref per instance namespace. */ -}}
{{- range $ns := include "opencrane.instanceNamespaces" $ | fromJsonArray }}
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ include "opencrane.fullname" $ }}-gcp-secret-manager
  namespace: {{ $ns | quote }}
  labels:
    {{- include "opencrane.labels" $ | nindent 4 }}
spec:
  provider:
    gcpsm:
      projectID: {{ $projectID }}
      auth:
        workloadIdentity:
          clusterLocation: {{ $clusterLocation | quote }}
          clusterName: ""
          serviceAccountRef:
            # A namespaced SecretStore can only reference a SA in its own namespace.
            name: {{ $saName }}
            namespace: {{ $ns | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
