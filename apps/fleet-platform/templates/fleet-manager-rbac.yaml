{{- if .Values.fleetManager.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "opencrane.fullname" . }}-fleet-manager
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
{{- if eq (include "opencrane.namespacedRbac" .) "true" }}
{{- /*
  Multi-instance mode (brief B1): grant the operator only over the namespace(s)
  this instance owns, via Role + RoleBinding. Instance A's operator SA therefore
  cannot read/write instance B's Tenants, Secrets, Deployments, etc.
*/}}
{{- $namespaces := include "opencrane.instanceNamespaces" . | fromJsonArray }}
{{- range $ns := $namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "opencrane.fullname" $ }}-fleet-manager
  namespace: {{ $ns }}
  labels:
    {{- include "opencrane.labels" $ | nindent 4 }}
rules:
{{ include "opencrane.fleetManagerRbacRules" $ | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "opencrane.fullname" $ }}-fleet-manager
  namespace: {{ $ns }}
  labels:
    {{- include "opencrane.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "opencrane.fullname" $ }}-fleet-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "opencrane.fullname" $ }}-fleet-manager
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- else }}
{{- /*
  Legacy single-install mode: cluster-wide ClusterRole + ClusterRoleBinding.
*/}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "opencrane.fullname" . }}-fleet-manager
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
rules:
{{ include "opencrane.fleetManagerRbacRules" . | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "opencrane.fullname" . }}-fleet-manager
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "opencrane.fullname" . }}-fleet-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "opencrane.fullname" . }}-fleet-manager
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
