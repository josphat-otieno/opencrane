{{- if .Values.skillRegistry.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opencrane.fullname" . }}-skill-registry
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: skill-registry
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.skillRegistry.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "opencrane.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: skill-registry
{{- end }}
