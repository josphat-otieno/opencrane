# Reference values — OpenCrane instance "globex" (native multi-instance, single cluster).
#
# Install (CRDs are installed ONCE cluster-wide first — see docs/multi-instance.md):
#   kubectl apply -f platform/helm/crds/
#   helm install oc-globex platform/helm -n oc-globex --create-namespace --skip-crds \
#     -f platform/helm/values/multi-instance/oc-globex.yaml
#
# Pairs with oc-acme.yaml to demonstrate two strictly-isolated instances in one
# cluster (brief §5 acceptance). Validate statically with
# platform/tests/multi-instance-conformance.sh.

multiInstance:
  enabled: true
  instanceNamespaces: [oc-globex]
  rbac: namespaced
  requireWatchNamespace: true
  certIssuer: namespaced
  secretStore: namespaced

fleetManager:
  watchNamespace: oc-globex

ingress:
  domain: globex.example.com
