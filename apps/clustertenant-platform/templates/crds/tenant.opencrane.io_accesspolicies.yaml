{{- /*
  Chart self-sufficiency (#151 item 3): the AccessPolicy CRD.

  Namespaced; the silo's PolicyOperator watches + reconciles AccessPolicies directly in the
  silo's own namespace (full CRUD via clustertenantManagerRbacRules). Gated the same way as
  the ClusterTenant/Tenant CRDs: set `crds.install=false` in a fleet-managed topology where
  the fleet chart already installed this CRD cluster-wide. `helm.sh/resource-policy: keep` so
  `helm uninstall` of one silo never deletes a CRD every other silo's AccessPolicy CRs depend
  on. Body copied verbatim from
  `git show main:apps/fleet-platform/crds/tenant.opencrane.io_accesspolicies.yaml`.
*/ -}}
{{- if .Values.crds.install }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: accesspolicies.opencrane.io
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
spec:
  group: opencrane.io
  names:
    kind: AccessPolicy
    listKind: AccessPolicyList
    plural: accesspolicies
    singular: accesspolicy
    shortNames:
      - ap
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              properties:
                description:
                  type: string
                  description: Human-readable description of this policy
                tenantSelector:
                  type: object
                  description: Label selector to match tenants this policy applies to
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
                    matchTeam:
                      type: string
                      description: Apply to all tenants in this team
                domains:
                  type: object
                  properties:
                    allow:
                      type: array
                      items:
                        type: string
                      description: "Allowed external domains (e.g. api.openai.com, *.salesforce.com)"
                    deny:
                      type: array
                      items:
                        type: string
                      description: Denied domains (takes precedence over allow)
                    defaultDeny:
                      type: boolean
                      default: true
                      description: Deny all domains not explicitly allowed
                egressRules:
                  type: array
                  items:
                    type: object
                    properties:
                      cidr:
                        type: string
                        pattern: '^([0-9]{1,3}[.]){3}[0-9]{1,3}/[0-9]{1,2}$'
                      ports:
                        type: array
                        items:
                          type: integer
                      protocol:
                        type: string
                        enum: [TCP, UDP]
                        default: TCP
                  description: CIDR-based egress rules for standard NetworkPolicy
            status:
              type: object
              properties:
                lastReconciled:
                  type: string
                  format: date-time
                  description: ISO-8601 timestamp of the last successful reconciliation
      additionalPrinterColumns:
        - name: Description
          type: string
          jsonPath: .spec.description
        - name: Default Deny
          type: boolean
          jsonPath: .spec.domains.defaultDeny
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
{{- end }}
