# OpenCrane Platform configuration

# -- Global chart settings
global:
  # -- Deployment environment used for Helm validations (`dev`, `staging`, `prod`).
  environment: dev

# -- Operator settings
operator:
  image:
    repository: ghcr.io/opencrane/operator
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # -- Namespace to watch for Tenant CRs (empty = all namespaces)
  watchNamespace: ""
  # -- Minutes of inactivity before auto-suspending a tenant (0 = disabled)
  idleTimeoutMinutes: 30
  # -- How often (seconds) the idle-checker scans for inactive tenants
  idleCheckIntervalSeconds: 60

# -- Control plane settings
controlPlane:
  image:
    repository: ghcr.io/opencrane/control-plane
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # -- PostgreSQL database connection
  database:
    # -- Direct connection string (use existingSecret in production)
    url: ""
    # -- Name of an existing K8s Secret containing DATABASE_URL
    existingSecret: ""
    # -- Key within the Secret that holds the connection string
    secretKey: DATABASE_URL
  # -- Cognee integration for control-plane permission synchronization
  cognee:
    # -- Cognee HTTP endpoint used by control-plane permission sync routes
    endpoint: "http://cognee:8000"
    # -- Enable Cognee backend access controls (tenant isolation + RBAC enforcement)
    backendAccessControl: true
    # -- Permission sync timeout in milliseconds
    permissionsTimeoutMs: 5000

# -- LiteLLM integration settings
litellm:
  # -- Cost routing is enabled by default as part of platform setup.
  enabled: true
  endpoint: http://litellm:4000
  # -- Existing Secret containing LITELLM_MASTER_KEY for operator and control-plane
  existingSecret: ""
  secretKey: LITELLM_MASTER_KEY
  # -- Auto-generate and persist a random master key in chart-managed Secret when not using existingSecret.
  generateMasterKey: true
  # -- Default budget used by operator when tenant does not define monthlyBudgetUsd
  defaultMonthlyBudgetUsd: 50
  # -- Default spend path template for control-plane to query tenant spend from LiteLLM (tenant_id placeholder: {tenant})
  spendPathTemplate: "/spend/tenant/{tenant}"
  image:
    repository: ghcr.io/berriai/litellm
    tag: main-latest
    pullPolicy: IfNotPresent
  service:
    port: 4000
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  # -- Optional direct DATABASE_URL for LiteLLM. Prefer existingDatabaseSecret in production.
  databaseUrl: ""
  existingDatabaseSecret: ""
  databaseSecretKey: DATABASE_URL
  # -- Optional explicit master key override. Leave empty to auto-generate when generateMasterKey=true.
  #    Placeholder is ignored when auto-generation is enabled.
  masterKey: "change-me-in-production"

# -- Default tenant pod settings (can be overridden per Tenant CR)
tenant:
  defaultImage:
    repository: ghcr.io/opencrane/tenant
    tag: latest
    pullPolicy: IfNotPresent
  defaultResources:
    requests:
      cpu: 250m
      memory: 4Gi
    limits:
      cpu: "1"
      memory: 4Gi
  # -- OpenClaw gateway port inside tenant pods
  gatewayPort: 18789

# -- Hosting provider: onprem (default), gcp, azure, aws.
# Override with values/gcp.yaml etc. for cloud installs.
hosting:
  # -- Active hosting substrate. Defaults to on-prem; no cloud env vars required.
  provider: onprem
  # -- GCP-specific settings (required when provider=gcp)
  gcp:
    projectId: ""
    bucketPrefix: ""
    # -- CSI driver for GCS Fuse mounts; defaults to the standard GKE driver.
    csiDriver: gcsfuse.csi.storage.gke.io

# -- Ingress settings
ingress:
  enabled: true
  # -- Ingress class is set by the hosting adapter; override here only for custom setups.
  className: nginx
  # -- Base domain for tenant subdomains (tenant.domain)
  domain: opencrane.local
  annotations: {}
  tls:
    enabled: false
    # -- Secret name for wildcard TLS cert (*.domain)
    secretName: opencrane-wildcard-tls

# -- cert-manager TLS issuance (CONN.8). When enabled, renders a ClusterIssuer +
# a wildcard Certificate (*.ingress.domain, plus the apex) into ingress.tls.secretName.
# k8s-native, cloud-agnostic + on-prem. Requires cert-manager installed in-cluster.
certManager:
  enabled: false
  # -- Issuer mode: "acme" (production, public CA via DNS-01) or "selfSigned" (dev/local).
  mode: selfSigned
  # -- Name of the ClusterIssuer this chart creates and the Certificate references.
  issuerName: opencrane-issuer
  # -- Namespace the wildcard Certificate (and its Secret) are created in. Defaults to
  # the release namespace. TLS Secrets are namespace-scoped and an Ingress can only
  # reference a Secret in its OWN namespace, so this MUST equal the namespace tenant
  # Ingresses run in — i.e. the operator watchNamespace, where Tenant CRs are created.
  # If tenants are ever split across namespaces, a cert-reflector / per-namespace
  # Certificate is required instead (CONN.8 follow-up b).
  certificateNamespace: ""
  acme:
    # -- ACME directory URL (Let's Encrypt prod by default).
    server: https://acme-v02.api.letsencrypt.org/directory
    # -- Contact email for the ACME account (required in acme mode).
    email: ""
    # -- Secret name cert-manager stores the ACME account private key in.
    privateKeySecretName: opencrane-acme-account-key
    # -- DNS-01 solver. Wildcards require DNS-01 (HTTP-01 cannot issue them).
    # Set the block matching your provider; cloudflare shown as an example.
    # On-prem: use rfc2136 (BIND/PowerDNS + TSIG). See cluster-issuer.yaml.
    dns01:
      # -- Provider key: cloudflare | route53 | clouddns | azuredns | rfc2136 | "".
      provider: ""
      # -- Provider-specific solver config, rendered verbatim under solvers[].dns01.
      config: {}

# -- Obot MCP gateway plane settings.
# Uses the upstream obot-platform/obot image. Requires an `opencrane-obot` k8s Secret
# with key `dsn` containing the PostgreSQL DSN for Obot's own database.
# Authentication is disabled; access is controlled by NetworkPolicy (in-cluster only).
# Obot polls the control-plane /api/internal/obot-registry endpoint to sync the MCP catalog.
mcpGateway:
  enabled: true
  image:
    repository: ghcr.io/obot-platform/obot
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 8080
  podSecurityContext:
    runAsNonRoot: false
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

# -- Skill registry delivery plane settings (self-built; source in apps/skill-registry).
skillRegistry:
  enabled: true
  image:
    repository: ghcr.io/opencrane/skill-registry
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 5000
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # -- OCI registry (Zot) for digest-pinned skill-bundle storage (P4D.2). Default off;
  # enable once the publish/delivery cutover lands. The control plane reaches it via
  # SKILL_OCI_REGISTRY_URL (wired in the cutover slice).
  ociStore:
    enabled: false
    image:
      repository: ghcr.io/project-zot/zot-linux-amd64
      tag: latest
      pullPolicy: IfNotPresent
    service:
      port: 5000
    # -- Repository path bundles are stored under (registry name).
    repository: skills
    persistence:
      enabled: true
      size: 10Gi
      storageClass: ""
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi

# -- Audience-bound projected token settings for tenant access into ingress planes
projectedIdentity:
  ttlSeconds: 600

# -- Network policy (default egress control for tenant pods and ingress control
# for internal platform services)
networkPolicy:
  enabled: true
  # -- Allow DNS resolution
  allowDNS: true
  # -- Default allowed egress domains (requires Cilium for FQDN filtering)
  defaultAllowedDomains:
    - api.openai.com
    - api.anthropic.com
  # -- CIDR-based egress rules (works with standard NetworkPolicy)
  egressAllowCIDRs: []
  # -- Namespace where the ingress controller runs. Used by the control-plane
  # ingress NetworkPolicy to permit external API traffic routed through it.
  # Override for non-standard ingress namespaces (e.g. "traefik", "gateway").
  ingressNamespace: ingress-nginx

# -- Org-wide secrets injected into all tenant pods
orgSecrets:
  # -- Name of the Kubernetes Secret containing org-wide API keys
  secretName: org-shared-secrets
  # -- Keys to inject as env vars (key in Secret -> env var name)
  envMappings: {}
  #   openai-api-key: OPENAI_API_KEY
  #   anthropic-api-key: ANTHROPIC_API_KEY

# -- External Secrets Operator integration
externalSecrets:
  enabled: false
  # -- Secret store provider: gcp-secret-manager, azure-key-vault, aws-secrets-manager
  provider: ""

# -- Cloud-native observability (no in-cluster stack needed)
observability:
  # -- Enable structured logging for Cloud Logging (GKE auto-ingests)
  cloudLogging: false
  # -- Enable Cloud Error Reporting integration
  cloudErrorReporting: false
