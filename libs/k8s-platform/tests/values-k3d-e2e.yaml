# Standalone silo overrides for the k3d e2e smoke test (libs/k8s-platform/tests/k3d-e2e.sh),
# layered on top of apps/opencrane-infra/values/standalone.yaml. Only the locally-built
# images and k3d-safe ingress/litellm knobs are set here; the standalone topology
# (deploymentMode, self-seed, CRDs) lives in standalone.yaml + the script's --set flags.

# Silo chart image (opencrane-server = the in-silo controllers incl. the TenantOperator
# that reconciles the Tenant CR, plus the opencrane-ui API). Built as
# opencrane/opencrane-server:e2e from apps/opencrane.
clustertenantManager:
  image:
    repository: opencrane/opencrane-server
    tag: e2e
    pullPolicy: IfNotPresent

tenant:
  defaultImage:
    repository: opencrane/tenant
    tag: e2e
    pullPolicy: IfNotPresent

sharedSkills:
  enabled: true
  pvc:
    storageClass: local-path
    accessMode: ReadWriteOnce
    size: 1Gi

ingress:
  enabled: true
  className: nginx
  domain: opencrane.local

litellm:
  enabled: true
  masterKey: e2e-master-key
  image:
    repository: ghcr.io/berriai/litellm-non_root
    tag: main-v1.81.0-stable
    pullPolicy: Always
