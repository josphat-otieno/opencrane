{{- if .Values.fleetManager.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencrane.fullname" . }}-fleet-manager
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: fleet-manager
spec:
  replicas: {{ .Values.fleetManager.replicas }}
  selector:
    matchLabels:
      {{- include "opencrane.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: fleet-manager
  template:
    metadata:
      labels:
        {{- include "opencrane.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: fleet-manager
    spec:
      serviceAccountName: {{ include "opencrane.fullname" . }}-fleet-manager
      {{- $fleetDb := .Values.fleetManager.database | default dict }}
      {{- if or $fleetDb.existingSecret $fleetDb.url }}
      initContainers:
        # Apply pending Prisma migrations to the FLEET REGISTRY DB before the server starts, so the
        # fleet-manager never boots against an un-migrated registry (ClusterTenant/BillingAccount/
        # OrgMembership). Same image as the server → schema/migrations match the binary. Idempotent
        # (a no-op when already current). Only rendered when a fleet DB is wired (existingSecret/url);
        # a DB-less fleet has no registry to migrate. Mirrors the silo's db-migrate initContainer.
        - name: db-migrate
          image: "{{ .Values.fleetManager.image.repository }}:{{ .Values.fleetManager.image.tag }}"
          imagePullPolicy: {{ .Values.fleetManager.image.pullPolicy }}
          command: ["node", "apps/fleet-operator/dist/scripts/migrate.js"]
          env:
            {{- include "opencrane.fleetManagerDatabaseEnv" . | nindent 12 }}
      {{- end }}
      containers:
        - name: operator
          image: "{{ .Values.fleetManager.image.repository }}:{{ .Values.fleetManager.image.tag }}"
          imagePullPolicy: {{ .Values.fleetManager.image.pullPolicy }}
          env:
            # -- This pod's own namespace (downward API). Carried for log/trace attribution.
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- include "opencrane.observabilityEnv" (dict "ctx" $ "component" "fleet-manager") | nindent 12 }}
            # -- Fleet registry DB (Stage 3): the fleet-manager's HTTP API + registry live here.
            #    Resolved from fleetManager.database.* (installer-provisioned); empty → no DB wired.
            {{- include "opencrane.fleetManagerDatabaseEnv" . | nindent 12 }}
            # -- Fleet self-service gates (Stage 4): ClusterTenant management + billing are mounted
            #    on the fleet plane. When false the matching router is not mounted (and the fleet's
            #    cluster-scoped management/issuer RBAC is not rendered — see fleet-manager-rbac.yaml).
            - name: OPENCRANE_BILLING_ENABLED
              value: {{ ternary "true" "false" .Values.billing.enabled | quote }}
            - name: OPENCRANE_CLUSTER_TENANT_MANAGER_ENABLED
              value: {{ ternary "true" "false" .Values.fleetManager.clusterTenantApi.enabled | quote }}
            {{- if .Values.clusterTenant.seed.name }}
            # -- Single-tenant org seed, read at boot by the fleet's _SeedClusterTenant: creates the
            #    ClusterTenant registry row + CR + its `owner` OrgMembership directly (idempotent,
            #    fail-soft). Only rendered when a seed name is configured.
            - name: OPENCRANE_SEED_CLUSTER_TENANT_NAME
              value: {{ .Values.clusterTenant.seed.name | quote }}
            - name: OPENCRANE_SEED_CLUSTER_TENANT_DISPLAY_NAME
              value: {{ .Values.clusterTenant.seed.displayName | default .Values.clusterTenant.seed.name | quote }}
            - name: OPENCRANE_SEED_CLUSTER_TENANT_OWNER_EMAIL
              value: {{ .Values.clusterTenant.seed.ownerEmail | quote }}
            - name: OPENCRANE_SEED_CLUSTER_TENANT_TIER
              value: {{ .Values.clusterTenant.seed.tier | quote }}
            {{- end }}
            {{- with .Values.fleetManager.oidc }}
            {{- if .issuerUrl }}
            # -- OIDC human-login for the FLEET plane — the fleet's OWN Zitadel project with
            #    fleet-level roles (separate from each silo's per-org OIDC). Rendered iff issuerUrl
            #    is set; otherwise the fleet API stays in token/development auth mode.
            - name: OIDC_ISSUER_URL
              value: {{ .issuerUrl | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .clientId | quote }}
            - name: OIDC_REDIRECT_URI
              value: {{ .redirectUri | quote }}
            {{- if .existingSecret }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .existingSecret }}
                  key: {{ .clientSecretKey }}
            - name: OIDC_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .existingSecret }}
                  key: {{ .sessionSecretKey }}
            {{- else }}
            {{- if .clientSecret }}
            - name: OIDC_CLIENT_SECRET
              value: {{ .clientSecret | quote }}
            {{- end }}
            {{- if .sessionSecret }}
            - name: OIDC_SESSION_SECRET
              value: {{ .sessionSecret | quote }}
            {{- end }}
            {{- end }}
            {{- if .groupsClaim }}
            - name: OIDC_GROUPS_CLAIM
              value: {{ .groupsClaim | quote }}
            {{- end }}
            {{- if .rolesClaim }}
            - name: OIDC_ROLES_CLAIM
              value: {{ .rolesClaim | quote }}
            {{- end }}
            {{- if .platformOperatorGroups }}
            - name: OPENCRANE_PLATFORM_OPERATOR_GROUPS
              value: {{ .platformOperatorGroups | quote }}
            {{- end }}
            {{- if .orgAdminGroups }}
            - name: OPENCRANE_ORG_ADMIN_GROUPS
              value: {{ .orgAdminGroups | quote }}
            {{- end }}
            {{- if .platformOperatorSeedEmail }}
            # -- Per-cluster fleet platform-operator SEED: a caller whose VERIFIED email equals
            #    this becomes a platform operator (OR-ed with the group check). Empty ⇒ nobody.
            - name: OPENCRANE_PLATFORM_OPERATOR_SEED_EMAIL
              value: {{ .platformOperatorSeedEmail | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- with .Values.fleetManager.zitadel }}
            {{- if .mgmtApiUrl }}
            # -- Zitadel Management API: the fleet provisions per-org Zitadel orgs + OIDC apps and
            #    rotates its own SA key in-place. The SA key (jwt-bearer auth) is pulled from a
            #    Secret, never inlined; the service account MUST hold instance-level IAM_OWNER.
            - name: ZITADEL_MGMT_API_URL
              value: {{ .mgmtApiUrl | quote }}
            # -- Platform base domain the fleet derives each org's Zitadel redirect URIs from
            #    (https://<org>.<base>/...). REQUIRED alongside the mgmt API — the fleet refuses
            #    to build the Zitadel client without it. Defaults to the ingress base domain.
            - name: PLATFORM_BASE_DOMAIN
              value: {{ $.Values.ingress.domain | quote }}
            {{- if .existingSecret }}
            - name: ZITADEL_MGMT_SA_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .existingSecret }}
                  key: {{ .serviceAccountKeyKey | default "service-account-key" }}
            # -- Key-rotation support: the superadmin rotate endpoint patches this Secret in-place
            #    with the newly issued key. Paired with fleet-manager-zitadel-rotation-rbac.yaml.
            - name: ZITADEL_MGMT_SECRET_NAME
              value: {{ .existingSecret | quote }}
            - name: ZITADEL_MGMT_SECRET_KEY
              value: {{ .serviceAccountKeyKey | default "service-account-key" | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            # -- ClusterTenant lifecycle: the fleet's ONLY reconcile loop (the
            #    ClusterTenantOperator) binds each org's namespace and provisions its per-org
            #    domain. These four fields are all `_LoadFleetOperatorConfig` reads — every other
            #    operator env moved to the per-silo clustertenant-manager with the in-silo
            #    controllers (Stage 5).
            - name: INGRESS_DOMAIN
              value: {{ .Values.ingress.domain | quote }}
            # -- Per-org domain provisioning (fixed-wildcard topology). The ClusterTenant
            #    reconciler applies a per-org `*.<org>.<domain>` Certificate (cert-manager) and,
            #    when externalIp is set, declares a per-org DNSEndpoint CR (reconciled by
            #    external-dns). Both optional: an unset externalIp / absent CRD makes the
            #    reconciler skip the affected side effect at runtime rather than fail.
            - name: INGRESS_IP
              value: {{ .Values.ingress.externalIp | quote }}
            - name: CERT_MANAGER_ISSUER_NAME
              value: {{ .Values.certManager.issuerName | quote }}
            # -- Namespaced Issuer in multi-instance cert mode (MI.4), else the shared
            #    cluster-singleton ClusterIssuer.
            - name: CERT_MANAGER_ISSUER_KIND
              value: {{ if eq (include "opencrane.namespacedCertIssuer" .) "true" }}"Issuer"{{ else }}"ClusterIssuer"{{ end }}
          resources:
            {{- toYaml .Values.fleetManager.resources | nindent 12 }}
{{- end }}
