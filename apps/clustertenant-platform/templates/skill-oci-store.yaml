{{- /*
P4D.2 — Zot OCI registry for digest-pinned skill-bundle storage.

In-cluster, OCI-native store the control plane pushes published bundles into and the
internal delivery path pulls from by digest (see docs/skills-registry.md). Gated by
skillRegistry.ociStore.enabled (default off) so existing installs are unchanged until
the publish/delivery cutover lands. NetworkPolicy ingress (control-plane only) is
tightened in the cutover slice; nothing depends on this store until then.
*/ -}}
{{- if and .Values.skillRegistry.ociStore.enabled }}
{{- $oci := .Values.skillRegistry.ociStore }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencrane.fullname" . }}-skill-oci
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: skill-oci-store
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "opencrane.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: skill-oci-store
  template:
    metadata:
      labels:
        {{- include "opencrane.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: skill-oci-store
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: zot
          image: "{{ $oci.image.repository }}:{{ $oci.image.tag }}"
          imagePullPolicy: {{ $oci.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ $oci.service.port }}
          volumeMounts:
            - name: storage
              mountPath: /var/lib/registry
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml $oci.resources | nindent 12 }}
      volumes:
        - name: storage
        {{- if $oci.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "opencrane.fullname" . }}-skill-oci
        {{- else }}
          emptyDir: {}
        {{- end }}
        - name: tmp
          emptyDir: {}
{{- if $oci.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "opencrane.fullname" . }}-skill-oci
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: skill-oci-store
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ $oci.persistence.size }}
  {{- if $oci.persistence.storageClass }}
  storageClassName: {{ $oci.persistence.storageClass }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opencrane.fullname" . }}-skill-oci
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: skill-oci-store
spec:
  type: ClusterIP
  selector:
    {{- include "opencrane.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: skill-oci-store
  ports:
    - name: http
      port: {{ $oci.service.port }}
      targetPort: http
{{- end }}
