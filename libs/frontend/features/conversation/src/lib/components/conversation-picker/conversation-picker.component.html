<div class="wo-picker">
	<button type="button" class="wo-picker__trigger wo-mono" [class.wo-picker__trigger--open]="open()" (click)="toggle()">
		<i class="pi pi-microchip"></i>
		{{ label() }}
		<i class="pi pi-angle-down wo-picker__caret"></i>
	</button>

	@if (open()) {
		<div class="wo-picker__backdrop" (click)="close()"></div>
		<div class="wo-picker__menu">
			<p class="wo-picker__label">Agent</p>
			<button type="button" class="wo-picker__row" (click)="choose(null)">
				<span>Auto <span class="wo-picker__muted">(pod default)</span></span>
				@if (!selectedAgentId()) { <i class="pi pi-check wo-picker__check"></i> }
			</button>
			@for (agent of agents(); track agent.id) {
				<button type="button" class="wo-picker__row" (click)="choose(agent.id)">
					<span>{{ agent.name }}</span>
					@if (selectedAgentId() === agent.id) { <i class="pi pi-check wo-picker__check"></i> }
				</button>
			}

			<p class="wo-picker__label">Models</p>
			@if (models().length > 0) {
				@for (model of models(); track model.id) {
					<div class="wo-picker__model">
						<span class="wo-truncate">{{ model.name }}</span>
						@if (model.provider) { <span class="wo-picker__muted wo-mono">{{ model.provider }}</span> }
					</div>
				}
			} @else if (loaded()) {
				<p class="wo-picker__empty">No models reported by the pod.</p>
			} @else {
				<p class="wo-picker__empty">Loading…</p>
			}
		</div>
	}
</div>
