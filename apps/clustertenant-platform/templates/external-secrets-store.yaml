{{- if .Values.externalSecrets.enabled }}
{{- if eq (include "opencrane.externalSecretsShared" .) "true" }}
{{- /*
  sharedPlatform.externalSecrets.mode=shared: an externally-managed (Cluster)SecretStore
  already exists at sharedPlatform.externalSecrets.shared.secretStoreName. Render nothing
  here — a second SecretStore of the same name would either collide or silently orphan the
  external one. ExternalSecret resources (not yet templated by this chart; see followups)
  reference that name directly instead of this release's store.
*/ -}}
{{- else }}
{{- /*
  Chart self-sufficiency (#151 item 2): the ExternalSecrets Operator (ESO) (Cluster)SecretStore
  a STANDALONE silo (no fleet, FLEET_INTERNAL_URL empty) needs to pull secrets itself, instead
  of assuming a store already exists in-cluster. Gated on `externalSecrets.enabled` (off by
  default — nothing renders until an operator opts in) AND
  `sharedPlatform.externalSecrets.mode=instance` (the default; `shared` skips this file, see
  above). ESO itself (CRDs + controller) is a PREREQUISITE installed like cert-manager /
  external-dns — this chart does not bundle it.

  Scope: `opencrane.namespacedSecretStore` (multi-instance brief B4) selects a namespaced
  SecretStore (isolated per-instance) instead of the legacy cluster-singleton
  ClusterSecretStore. The `<fullname>-external-secrets` ServiceAccount is always rendered
  alongside so the (Cluster)SecretStore's Workload-Identity ref always resolves.

  Provider coverage: only `gcp-secret-manager` is wired today (Workload Identity binds the
  ServiceAccount above to a GSA with Secret Manager access via
  `externalSecrets.serviceAccountAnnotations`). `azure-key-vault` / `aws-secrets-manager` are
  accepted enum values in values.yaml but have no provider block here yet — rendering fails
  fast rather than silently emitting a store with no provider (see the `fail` below).
  Follow-up, not invented speculatively for this pass.

  ExternalSecret resources that bind org secrets (orgSecrets.secretName) / the LiteLLM key to
  this store are NOT rendered by this chart yet — tracked as a followup, out of scope for the
  store itself.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "opencrane.fullname" . }}-external-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: external-secrets
  {{- with .Values.externalSecrets.serviceAccountAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- if ne .Values.externalSecrets.provider "gcp-secret-manager" }}
{{- fail (printf "externalSecrets.provider=%q is not implemented yet — only \"gcp-secret-manager\" has a provider block in templates/external-secrets-store.yaml. Add the azure-key-vault / aws-secrets-manager provider block there before using it, or switch to gcp-secret-manager." .Values.externalSecrets.provider) }}
{{- end }}
apiVersion: external-secrets.io/v1beta1
kind: {{ eq (include "opencrane.namespacedSecretStore" .) "true" | ternary "SecretStore" "ClusterSecretStore" }}
metadata:
  name: {{ include "opencrane.fullname" . }}-secret-store
  {{- if eq (include "opencrane.namespacedSecretStore" .) "true" }}
  namespace: {{ .Release.Namespace }}
  {{- end }}
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: external-secrets
spec:
  provider:
    gcpsm:
      auth:
        workloadIdentity:
          serviceAccountRef:
            name: {{ include "opencrane.fullname" . }}-external-secrets
            {{- if ne (include "opencrane.namespacedSecretStore" .) "true" }}
            {{- /* ClusterSecretStore is cluster-scoped and has no namespace of its own, so
                   the ServiceAccount reference must say where the SA lives. A namespaced
                   SecretStore's SA is implicitly in the store's own namespace. */}}
            namespace: {{ .Release.Namespace }}
            {{- end }}
          {{- if .Values.hosting.gcp.projectId }}
          clusterProjectID: {{ .Values.hosting.gcp.projectId | quote }}
          {{- end }}
          {{- if .Values.hosting.gcp.clusterLocation }}
          clusterLocation: {{ .Values.hosting.gcp.clusterLocation | quote }}
          {{- end }}
{{- end }}
{{- end }}
