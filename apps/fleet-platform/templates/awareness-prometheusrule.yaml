{{- /*
P4B.6 — Fleet awareness SLO alerts.

Renders a Prometheus Operator PrometheusRule from the awareness metrics the
control-plane /prom endpoint exposes. Severity follows the locked P4B.0 model:
  - policy-violation rate must be 0      → page (critical)
  - version drift / non-participation    → warn (no page)
Requires the Prometheus Operator CRDs (monitoring.coreos.com/v1) in-cluster.
*/ -}}
{{- if .Values.monitoring.enabled }}
{{- $runbook := .Values.monitoring.runbookBaseUrl }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "opencrane.fullname" . }}-awareness-slo
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    role: alert-rules
spec:
  groups:
    - name: opencrane-awareness-slo
      rules:
        # Hard gate (locked): any policy-violating skill execution pages on-call.
        - alert: AwarenessPolicyViolations
          expr: opencrane_awareness_policy_violations_total > 0
          for: 0m
          labels:
            severity: {{ .Values.monitoring.pageSeverity | quote }}
            track: awareness
          annotations:
            summary: "Policy-violating skill executions detected in the fleet"
            description: "{{`{{ $value }}`}} policy-violating skill execution(s) across the fleet (SLO: 0)."
            runbook_url: "{{ $runbook }}/awareness-slos.md#policy-violations"
        # Warning: tenants running a contract version other than their rollout-expected one.
        - alert: AwarenessVersionDrift
          expr: opencrane_awareness_drifted_total > 0
          for: 15m
          labels:
            severity: {{ .Values.monitoring.warnSeverity | quote }}
            track: awareness
          annotations:
            summary: "Tenants drifted from their expected awareness contract version"
            description: "{{`{{ $value }}`}} tenant(s) running a contract version other than the rollout-expected one."
            runbook_url: "{{ $runbook }}/awareness-slos.md#version-drift"
        # Warning: tenants not seen within the participation staleness window.
        - alert: AwarenessNonParticipation
          expr: opencrane_awareness_non_participating_total > 0
          for: 30m
          labels:
            severity: {{ .Values.monitoring.warnSeverity | quote }}
            track: awareness
          annotations:
            summary: "Tenants not participating in the awareness fleet protocol"
            description: "{{`{{ $value }}`}} tenant(s) have not reported participation within the staleness window."
            runbook_url: "{{ $runbook }}/awareness-slos.md#non-participation"
{{- end }}
