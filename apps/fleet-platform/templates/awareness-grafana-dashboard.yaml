{{- /*
P4B.6 — Fleet awareness Grafana dashboard.

Ships the dashboard JSON as a ConfigMap labelled for the Grafana sidecar to
auto-import (the `grafana_dashboard` label is the standard sidecar convention).
Gated on monitoring.enabled so clusters without Grafana are unaffected.
*/ -}}
{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "opencrane.fullname" . }}-awareness-dashboard
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  awareness-slo.json: |-
    {{- .Files.Get "files/awareness-dashboard.json" | nindent 4 }}
{{- end }}
