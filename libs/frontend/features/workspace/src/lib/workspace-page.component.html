<div class="wo-workspace">
	<div class="wo-workspace__rail">
		<wo-sidebar
			[unreadCount]="3"
			(notificationsToggle)="notificationsOpen.set(!notificationsOpen())"
		/>
		@if (notificationsOpen()) {
			<wo-notification-panel (closed)="notificationsOpen.set(false)" />
		}
	</div>

	<router-outlet />
</div>
