apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "opencrane.fullname" . }}-control-plane
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "opencrane.fullname" . }}-control-plane
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
rules:
  # Read and write Tenant and AccessPolicy CRDs — the control-plane API creates,
  # patches, and deletes these directly (dual-write alongside PostgreSQL).
  - apiGroups: ["opencrane.io"]
    resources: ["tenants", "tenants/status", "accesspolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Mint short-lived, audience-bound tokens for a tenant's pod ServiceAccount via
  # the TokenRequest subresource (POST /api/v1/auth/pod-token — single sign-on
  # across the control plane and the tenant pod, see docs/auth.md). `create` on
  # serviceaccounts/token is the only verb required; RBAC has no wildcard
  # resourceNames so it cannot be pinned to the `openclaw-*` set — tighten to a
  # namespaced Role in the tenants namespace if tenants do not span namespaces.
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
  # Force-disconnect a tenant's live OpenClaw sockets for the connection
  # kill-switch (CONN.5): deleting the pod severs every established WebSocket
  # and is CNI-independent (a deny NetworkPolicy only helps if the CNI drops
  # *established* flows). `deletecollection` lets the control-plane cut by the
  # `opencrane.io/tenant=<name>` label selector in one call; `get`/`list` back
  # the pre-delete lookup. No create/update — the operator owns pod creation.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete", "deletecollection"]
  # Onboarding TLS issuance (CONN.8a): the `oc platform dns set` endpoint upserts a
  # cert-manager ACME DNS-01 ClusterIssuer (cluster-scoped, so it must be here). The
  # DNS-provider credentials Secret it references is granted via a namespace-scoped
  # Role in the cert-manager namespace (below) — NOT cluster-wide secrets write.
  - apiGroups: ["cert-manager.io"]
    resources: ["clusterissuers"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "opencrane.fullname" . }}-control-plane
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "opencrane.fullname" . }}-control-plane
subjects:
  - kind: ServiceAccount
    name: {{ include "opencrane.fullname" . }}-control-plane
    namespace: {{ .Release.Namespace }}
{{- if .Values.certManager.enabled }}
---
# CONN.8a least-privilege: the DNS-provider credentials Secret the control-plane
# writes for `oc platform dns set` lives in the cert-manager controller namespace
# (cert-manager reads ClusterIssuer solver Secrets only from its own namespace).
# Grant secrets write THERE via a namespaced Role — not cluster-wide.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "opencrane.fullname" . }}-control-plane-dns01
  namespace: {{ default "cert-manager" .Values.certManager.namespace }}
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "opencrane.fullname" . }}-control-plane-dns01
  namespace: {{ default "cert-manager" .Values.certManager.namespace }}
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "opencrane.fullname" . }}-control-plane-dns01
subjects:
  - kind: ServiceAccount
    name: {{ include "opencrane.fullname" . }}-control-plane
    namespace: {{ .Release.Namespace }}
{{- end }}
