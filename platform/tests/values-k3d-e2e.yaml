operator:
  image:
    repository: opencrane/operator
    tag: e2e
    pullPolicy: IfNotPresent
  watchNamespace: opencrane-system

controlPlane:
  replicas: 0

tenant:
  defaultImage:
    repository: opencrane/tenant
    tag: e2e
    pullPolicy: IfNotPresent

sharedSkills:
  enabled: true
  pvc:
    storageClass: local-path
    accessMode: ReadWriteOnce
    size: 1Gi

ingress:
  enabled: true
  className: nginx
  domain: opencrane.local

litellm:
  enabled: true
  masterKey: e2e-master-key
  image:
    repository: ghcr.io/berriai/litellm-non_root
    tag: main-v1.81.0-stable
    pullPolicy: Always
