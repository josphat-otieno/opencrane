# Static SPA serving config for the OpenCrane control-plane (org-admin) frontend.
#
# The nginxinc/nginx-unprivileged base runs as a non-root user and listens on 8080
# (matches the Deployment containerPort + probes in
# apps/clustertenant-platform/templates/control-plane-spa-deployment.yaml).
#
# Same-origin contract: this server only ever serves the static SPA. `/api` and
# `/gateway` are routed to the OpenCrane backend by the chart's Ingress (see
# apps/clustertenant-platform/templates/clustertenant-manager-ingress.yaml), never by
# nginx — so there is deliberately no proxy_pass here.

server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Lightweight liveness/readiness endpoint (the k8s probes hit this).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Hashed build artifacts (outputHashing: all) are immutable — cache hard.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached, or clients pin a stale app shell that
    # references deleted hashed bundles after a redeploy.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
    }

    # SPA fallback: client-side routes (/customers, /settings, …) resolve to the
    # app shell so a deep-link refresh does not 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
