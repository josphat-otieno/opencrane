# Reference values — OpenCrane instance "acme" (native multi-instance, single cluster).
#
# Install (CRDs are installed ONCE cluster-wide first — see docs/multi-instance.md):
#   kubectl apply -f platform/helm/crds/
#   helm install oc-acme platform/helm -n oc-acme --create-namespace --skip-crds \
#     -f platform/helm/values/multi-instance/oc-acme.yaml
#
# Pairs with oc-globex.yaml to demonstrate two strictly-isolated instances in one
# cluster (brief §5 acceptance). Validate statically with
# platform/tests/multi-instance-conformance.sh.

multiInstance:
  enabled: true
  # This instance owns exactly its own namespace; namespaced RBAC + the
  # cross-instance default-deny NetworkPolicy are rendered for it.
  instanceNamespaces: [oc-acme]
  rbac: namespaced
  # Fail closed: the operator refuses to start if WATCH_NAMESPACE is empty, so it
  # can never reconcile oc-globex's Tenants.
  requireWatchNamespace: true
  # Per-instance cert Issuer + SecretStore (no shared cluster-singleton).
  certIssuer: namespaced
  secretStore: namespaced

fleetManager:
  # Scope the watch to this instance's namespace only.
  watchNamespace: oc-acme

ingress:
  domain: acme.example.com
