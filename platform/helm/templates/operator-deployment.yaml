apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencrane.fullname" . }}-operator
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      {{- include "opencrane.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        {{- include "opencrane.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: {{ include "opencrane.fullname" . }}-operator
      containers:
        - name: operator
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          env:
            - name: WATCH_NAMESPACE
              value: {{ .Values.operator.watchNamespace | quote }}
            - name: TENANT_DEFAULT_IMAGE
              value: "{{ .Values.tenant.defaultImage.repository }}:{{ .Values.tenant.defaultImage.tag }}"
            - name: INGRESS_DOMAIN
              value: {{ .Values.ingress.domain | quote }}
            - name: GATEWAY_PORT
              value: {{ .Values.tenant.gatewayPort | quote }}
            - name: HOSTING_PROVIDER
              value: {{ .Values.hosting.provider | quote }}
            {{- if eq .Values.hosting.provider "gcp" }}
            - name: GCP_PROJECT_ID
              value: {{ .Values.hosting.gcp.projectId | quote }}
            - name: GCP_BUCKET_PREFIX
              value: {{ .Values.hosting.gcp.bucketPrefix | quote }}
            - name: GCP_CSI_DRIVER
              value: {{ .Values.hosting.gcp.csiDriver | quote }}
            {{- end }}
            - name: IDLE_TIMEOUT_MINUTES
              value: {{ .Values.operator.idleTimeoutMinutes | quote }}
            - name: IDLE_CHECK_INTERVAL_SECONDS
              value: {{ .Values.operator.idleCheckIntervalSeconds | quote }}
            - name: MCP_GATEWAY_URL
              value: {{ printf "http://%s-mcp-gateway:%v" (include "opencrane.fullname" .) .Values.mcpGateway.service.port | quote }}
            - name: SKILL_REGISTRY_URL
              value: {{ printf "http://%s-skill-registry:%v" (include "opencrane.fullname" .) .Values.skillRegistry.service.port | quote }}
            - name: PROJECTED_TOKEN_TTL_SECONDS
              value: {{ .Values.projectedIdentity.ttlSeconds | quote }}
            - name: LITELLM_ENABLED
              value: {{ .Values.litellm.enabled | quote }}
            - name: LITELLM_ENDPOINT
              value: {{ .Values.litellm.endpoint | quote }}
            - name: LITELLM_DEFAULT_MONTHLY_BUDGET_USD
              value: {{ .Values.litellm.defaultMonthlyBudgetUsd | quote }}
            {{- if .Values.litellm.enabled }}
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.litellm.existingSecret }}
                  name: {{ .Values.litellm.existingSecret }}
                  {{- else }}
                  name: {{ include "opencrane.fullname" . }}-litellm
                  {{- end }}
                  key: {{ .Values.litellm.secretKey }}
            {{- end }}
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
