# Serves the VitePress build. `cleanUrls` is enabled in the site config, so
# requests for /foo must resolve to /foo.html — the try_files chain handles that.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets are content-hashed by Vite; cache them aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    error_page 404 /404.html;
}
