name: Deploy docs site

# Builds the VitePress documentation site (website/) and deploys it to GitHub
# Pages. The interactive API reference is rendered from the checked-in OpenAPI
# snapshot, so this deployment is fully static.

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    # pages:write + id-token:write let configure-pages enable Pages on first run.
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages (source = GitHub Actions) automatically on first run,
          # so no manual Settings toggle is needed.
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Build site
        # Served at the opencrane.ai custom domain (website/public/CNAME), so base
        # stays '/' — no DOCS_BASE override.
        # Build the website package directly so this doesn't depend on a root
        # `docs:build` alias being present.
        run: npm run build -w @opencrane/website

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/.vitepress/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
