{{- if and .Values.docs.enabled .Values.docs.ingress.enabled }}
{{- $host := .Values.docs.ingress.host | default (printf "docs.%s" .Values.ingress.domain) }}
{{- $className := .Values.docs.ingress.className | default .Values.ingress.className }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "opencrane.fullname" . }}-docs
  labels:
    {{- include "opencrane.labels" . | nindent 4 }}
    app.kubernetes.io/component: docs
  {{- with .Values.docs.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if $className }}
  ingressClassName: {{ $className }}
  {{- end }}
  {{- if .Values.docs.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $host | quote }}
      secretName: {{ required "docs.ingress.tls.secretName is required when docs.ingress.tls.enabled" .Values.docs.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "opencrane.fullname" . }}-docs
                port:
                  number: {{ .Values.docs.service.port }}
{{- end }}
